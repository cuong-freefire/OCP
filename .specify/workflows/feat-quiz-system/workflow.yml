schema_version: "1.0"
workflow:
  id: "feat-quiz-system"
  name: "Workflow Quiz System"
  version: "1.0.0"
  author: "Đội ngũ OCP"
  description: "Tạo tài liệu bối cảnh quiz system, sau đó chạy các lệnh đặc tả (specify), lập kế hoạch (plan) và tạo nhiệm vụ (tasks) của Speckit."
  integration: "auto"

requires:
  speckit_version: ">=0.8.18"
  integrations:
    any:
      - "codex"
      - "claude"
      - "copilot"
      - "gemini"

inputs:
  feature_dir:
    type: string
    default: ".sdd/specs/feat-quiz-system"
    prompt: "Thư mục lưu trữ các tài liệu (artifacts) của tính năng quiz system"
  integration:
    type: string
    default: "auto"
    prompt: "Tích hợp sẽ sử dụng; 'auto' nghĩa là dùng tích hợp đã được khởi tạo của dự án"
  feature:
    type: string
    default: "Xây dựng tính năng Quiz System OCP bao gồm: học viên đã đăng nhập có thể xem các bài kiểm tra (quiz) đang hoạt động gắn với khóa học hoặc bài học (lesson) mà họ có quyền truy cập; backend kiểm soát quyền làm quiz thông qua Enrollment/Access authority; backend gửi câu hỏi an toàn (không bao gồm đáp án đúng trước khi nộp bài); learner submit câu trả lời; backend tự động chấm điểm cho các loại câu hỏi được hỗ trợ (single_choice, multiple_choice, true_false); backend lưu bài nộp (quiz submission) và điểm số; backend trả kết quả quiz cho learner sau khi nộp; learner có thể xem lịch sử bài nộp của chính mình. Backend là source of truth cho quiz eligibility, timing, scoring, và result ownership. Quiz gắn với course/lesson. Chỉ learner có enrollment mới được làm quiz của paid course. Frontend không được quyết định score, max score, pass status, correct answer, userId, course access, payment status, hoặc result ownership. Không bao gồm: quiz authoring UI, quiz/question CRUD, bulk import, manual grading, essay/free-text questions, partial-credit scoring, randomized question pools, anti-cheating, proctoring, browser lockdown, retake limits, cooldowns, leaderboards, gamification, certificate generation, admin report dashboards, payment checkout, enrollment creation, learning progress ngoài quiz attempt history, và final project/mentor review workflows."
    prompt: "Mô tả tính năng Quiz System"

steps:
  - id: context
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: |
      Tạo tài liệu bối cảnh tính năng (feature context) tại đường dẫn {{ inputs.feature_dir }}/context.md cho tính năng feat-quiz-system.

      Bạn BẮT BUỘC phải đọc các file sau trước khi viết tài liệu bối cảnh:
      - DATABASE.md
      - AGENTS.md
      - PROJECT_AGENTS.md
      - frontend/DESIGN.md
      - backend/.env.example
      - frontend/.env.example

      Sử dụng các quy tắc của dự án OCP từ các file trên như các ràng buộc bắt buộc.
      Tài liệu bối cảnh BẮT BUỘC phải sử dụng chính xác các phần sau:
      1. PROBLEM STATEMENT (Tuyên bố bài toán)
      2. DOMAIN KNOWLEDGE (Kiến thức chuyên môn / Nghiệp vụ)
      3. STAKEHOLDERS (Các bên liên quan)
      4. CONSTRAINTS (Các ràng buộc)
      5. ASSUMPTIONS (Các giả định)
      6. OPEN QUESTIONS (Các câu hỏi còn bỏ ngỏ)

      Phạm vi tính năng:
      {{ inputs.feature }}

      Bao gồm các ràng buộc quiz system sau:
      - Quiz System yêu cầu session backend-authenticated hợp lệ cho mọi hành vi protected quiz: listing, start, submission, result review, và history.
      - Backend-authenticated identity là nguồn duy nhất cho learner user id; KHÔNG chấp nhận frontend-supplied user id, role, enrollment state, payment state, access state, score, max score, hoặc passed state.
      - Quyền truy cập khóa học phải được xác nhận qua Enrollment/Access authority trước khi trả về quiz details, quiz questions, chấp nhận submission, hoặc trả về quiz history cho paid course.
      - Quiz System KHÔNG đọc hoặc quyết định payment status trực tiếp; paid-course quiz unlock decisions thuộc về Payment/Enrollment/Access module.
      - Hệ thống chỉ trả về active quizzes cho learner-facing quiz availability; draft/inactive quizzes không được hiển thị.
      - Quiz có thể gắn với course (bắt buộc) và có thể gắn với lesson (khi có lesson_id).
      - Hệ thống phải validate quiz thuộc course active/accessible và lesson active/available trước khi cho learner start hoặc submit.
      - Safe quiz metadata gồm: title, description, question count, optional time limit, passing score, và learner's own attempt summary.
      - Pre-submission question payload KHÔNG bao gồm correct_answer, explanation, raw scoring internals, hoặc bất kỳ field nào tiết lộ đáp án đúng hoặc điểm số.
      - Hỗ trợ loại câu hỏi: single_choice, multiple_choice, true_false.
      - Validated submitted answers trước khi scoring: check question ids, question type, available options.
      - Reject submissions chứa unknown question ids, duplicate question ids, malformed answer values, unsupported question types, hoặc answers ngoài quiz.
      - Score và max score được backend tính từ stored question points và stored correct answers.
      - Passed status được backend xác định từ quiz passing_score threshold và calculated score percentage.
      - KHÔNG trust frontend-provided score, max score, passed status, correct answer, explanation, started time, submitted time, hoặc elapsed time.
      - Lưu mỗi valid quiz submission với: learner identity, quiz identity, submitted answers, backend-calculated score, max score, passed status, started time, submitted time, và creation time.
      - Enforce timed quiz rules khi time_limit_minutes được cấu hình; ngăn normal successful scoring cho late submissions.
      - Quiz với no active questions phải unavailable cho successful submission.
      - Learner có thể xem result của chính mình: score, max score, passed status, submitted time, và safe per-question review data.
      - Correct answer và explanation có thể revealed sau submission, nhưng chỉ cho learner sở hữu submission.
      - Ngăn learner view, modify, hoặc delete submission của learner khác.
      - Learner có thể xem submission history của chính mình cho accessible course/quiz.
      - Submission history trả về sanitized attempt data; KHÔNG bao gồm raw correct answer data trừ khi là allowed post-submission result view.
      - Multiple-choice scoring: so sánh selected options order-insensitive; reject extra selected options là incorrect.
      - Quiz module ownership: quizzes, quiz_questions, quiz_submissions thuộc Quiz module; sử dụng approved Auth/User, Course, và Enrollment/Access contracts cho external data.
      - Frontend route guards, visible quiz buttons, cached quiz state, hoặc timer displays MAY improve UX nhưng KHÔNG được treated là real quiz eligibility, timing, scoring, hoặc result ownership.
      - Quiz request bodies và route parameters quan trọng phải được validated trước khi business behavior chạy.
      - Error responses phải follow project response shape { success, message, code, details } hoặc approved equivalent và avoid raw stack traces hoặc raw infrastructure details.
      - Quiz responses KHÔNG expose password hashes, JWT values, cookie values, payment internals, raw SQL errors, raw persistence errors, secrets, hoặc submission data của learner khác.
      - Hệ thống phải fail safely khi required Auth, Course, hoặc Enrollment/Access dependencies không thể confirm identity, quiz context, course structure, hoặc access.
      - Quiz với time_limit_minutes = null không có timer enforcement.
      - Timed quiz windows bắt đầu khi backend records learner's quiz start time.
      - Learners có thể có multiple submissions trừ khi later spec định nghĩa retake limits.
      - Explanations chỉ được show sau submission và chỉ cho learner sở hữu submission.

      Không triển khai code. Chỉ tạo mới hoặc cập nhật file context.md.

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: |
        SPECIFY_FEATURE_DIRECTORY={{ inputs.feature_dir }}

        Sử dụng cú pháp lệnh mới nhất của Speckit cho lệnh speckit.specify.

        Bạn BẮT BUỘC phải đọc các file sau trước khi tạo file spec.md:
        - DATABASE.md
        - AGENTS.md
        - PROJECT_AGENTS.md
        - frontend/DESIGN.md
        - backend/.env.example
        - frontend/.env.example
        - {{ inputs.feature_dir }}/context.md

        Tạo đặc tả tính năng (feature specification) cho tính năng feat-quiz-system.

        Phạm vi tính năng:
        {{ inputs.feature }}

        Hành vi bắt buộc:
        - Học viên đã sign-in có thể xem active quizzes gắn với course/lesson chỉ khi backend rules confirm learner có active course access.
        - Học viên với active access có thể start active quiz và nhận questions với answer options; correct answers và scoring internals remain hidden đến sau submission.
        - Learner có thể submit answers; backend validate answers, apply correct scoring rule cho mỗi loại câu hỏi, determine passed status, store authoritative result.
        - Sau khi submit, learner có thể review result của chính mình: score, max score, passed status, và safe per-question review data.
        - Learner có thể view past quiz attempts của chính mình cho course/quiz.
        - Quiz System sử dụng trusted Auth identity, Course structure, và Enrollment/Access decisions; chỉ owns quiz, question, và submission behavior.
        - Quiz gắn với course (bắt buộc) và lesson (khi có lesson_id).
        - Chỉ learner có enrollment mới được làm quiz của paid course.
        - Backend auto-grade cho single_choice, multiple_choice, true_false.
        - Lưu quiz submission và score.
        - Trả kết quả quiz cho learner.
        - Multiple-choice answer comparison phải order-insensitive; extra selections bị tính là incorrect.
        - Spec phải ghi rõ các biến môi trường cần thiết dựa trên backend/.env.example và frontend/.env.example, gồm API base URL, CORS origin, database URL, auth session và cookies config, và token lifetime.
        - Backend implementation được phép load backend/.env bằng dotenv và đọc qua process.env, nhưng không được log hoặc trả về secret env value. Chỉ được nhắc tên biến trong log/error/docs.
        - Giữ vững ranh giới của module quiz; các module khác sẽ sử dụng dữ liệu thông qua các giao ước (contracts) của Quiz.
        - Xác định rõ ràng các phần nằm ngoài phạm vi (out-of-scope): quiz authoring UI, quiz CRUD, question CRUD, bulk question import, question reordering, hoặc admin content management; course CRUD, lesson management, category management, hoặc course content editing; enrollment creation, free course enrollment, payment checkout, VNPAY processing, payment verification, order status updates, và payment-driven access unlock; auth registration, email verification, login, logout, refresh-token rotation, password reset, Google OAuth, và profile management; learning progress completion, lesson progress tracking, course progress recalculation, và continue-learning behavior ngoài quiz attempt history; final project submission, mentor review, mentor feedback, và final project pass/fail decisions; certificate generation, certificate eligibility, certificate storage, và certificate download; manual grading, essay/free-text questions, partial-credit scoring, randomized question pools, anti-cheating measures, proctoring, browser lockdown, retake limits, retake cooldowns, leaderboards, và gamification features; admin report dashboards và analytics snapshots beyond preserving sanitized quiz submission data cho future reporting.

        Các quyết định sản phẩm đã được thông qua:
        - Learners phải sign-in trước khi sử dụng protected Quiz System behavior.
        - Active course access được determine bởi Payment/Enrollment/Access module, bao gồm free enrollment và paid enrollment sau verified successful payment.
        - Course và lesson status, structure, và availability được owned bởi Course module và consumed bởi Quiz qua approved contracts.
        - Active quizzes và questions đã tồn tại qua seed data, approved admin/content workflow, hoặc later quiz-authoring feature; authoring không phải part của learner-facing MVP này.
        - Quiz passing_score được interpret là percentage threshold từ 0 đến 100.
        - Multiple-choice questions yêu cầu exact set matching cho full credit. Partial-credit scoring được defer.
        - Quiz với time_limit_minutes = null không có timer enforcement.
        - Timed quiz windows bắt đầu khi backend records learner's quiz start time.
        - Learners có thể có multiple submissions trừ khi later spec định nghĩa retake limits, cooldowns, hoặc best-score behavior.
        - Explanations chỉ được show sau submission và chỉ khi safe cho learner sở hữu submission.
        - Frontend quiz screens có thể improve navigation và feedback, nhưng tất cả real access, timing, scoring, pass/fail, và result ownership decisions remain backend-controlled.
        - Quiz System có thể expose stable submission data cho future course progress, certificate, report, hoặc learning analytics features, nhưng những features define eligibility và business rules của họ trong separate specs.

        Không bao gồm các chi tiết triển khai mã nguồn nằm ngoài yêu cầu đặc tả của Speckit.

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: |
        Sử dụng cú pháp lệnh mới nhất của Speckit cho lệnh speckit.plan.

        Bạn BẮT BUỘC phải đọc các file sau trước khi tạo file plan.md:
        - DATABASE.md
        - AGENTS.md
        - PROJECT_AGENTS.md
        - frontend/DESIGN.md
        - backend/.env.example
        - frontend/.env.example
        - {{ inputs.feature_dir }}/context.md
        - {{ inputs.feature_dir }}/spec.md

        Các ràng buộc kỹ thuật:
        - Backend: REST API viết bằng NodeJS + JavaScript ESM theo phong cách Express; dùng package.json "type": "module" và import/export; không dùng TypeScript hoặc CommonJS cho scope hiện tại.
        - Frontend: React + JSX + Bootstrap bằng Create React App/react-scripts; API client phải gửi cookie bằng withCredentials: true.
        - Frontend UI: Bắt buộc đọc và bám frontend/DESIGN.md khi lập kế hoạch các trang quiz listing, quiz taking, quiz result, và quiz history.
        - Env config: Bắt buộc dùng đúng tên biến trong backend/.env.example và frontend/.env.example. Backend load backend/.env bằng dotenv và đọc qua process.env. Backend dùng FRONTEND_ORIGIN, DATABASE_URL, AUTH_SECRET, COOKIE_ACCESS_NAME, COOKIE_REFRESH_NAME, JWT_ACCESS_EXPIRES_IN, JWT_REFRESH_EXPIRES_IN. Frontend dùng REACT_APP_API_BASE_URL; không dùng VITE_*.
        - Package manager: npm. Root/backend/frontend scripts dùng npm, không dùng pnpm/yarn trong scope này.
        - Frontend env variables dùng prefix REACT_APP_, hiện cần REACT_APP_API_BASE_URL; không dùng VITE_.
        - Test setup đã duyệt: backend dùng node:test + assert + supertest; frontend dùng node:test cho API client/source-rule tests nhẹ; không thêm Jest/Vitest/Cypress nếu chưa được duyệt.
        - ORM/Cơ sở dữ liệu: Prisma + MySQL.
        - Kiểm tra dữ liệu đầu vào (Validation): Sử dụng Zod cho body/query/params quan trọng.
        - Xác thực (Auth): JWT lưu trong Cookie httpOnly; Quiz System sử dụng backend-authenticated session identity từ Auth module.
        - Cookie/CORS auth: sameSite = "lax", secure = false ở local dev, secure = true ở production, CORS exact FRONTEND_ORIGIN + credentials: true, không wildcard origin khi gửi cookie.
        - Module boundaries: Quiz System sử dụng Auth/User identity, Course structure/lesson context, và Enrollment/Access decisions qua approved contracts; không import Prisma trực tiếp trong service, không query trực tiếp table của module khác.
        - Các Controller không được chứa logic nghiệp vụ (business logic).
        - Các Service không được phép import trực tiếp thư viện Prisma.
        - Các Repository nắm quyền truy cập và thao tác với cơ sở dữ liệu.
        - Không lưu trữ các thông tin thô như: JWT thô, password hashes, cookie values, payment internals, raw SQL errors, raw persistence errors, secrets, correct_answer trước submission, hoặc submission data của learner khác.
        - Sử dụng các giao ước (contracts) từ phía backend để quản lý định danh và quyền truy cập; các bộ bảo vệ (guards) ở frontend chỉ phục vụ cho trải nghiệm người dùng (UX).
        - Quiz module data ownership: quizzes, quiz_questions, quiz_submissions; sử dụng approved cross-module contracts cho Auth/User identity, Course structure, và Enrollment/Access.
        - Auto-grading logic phải nằm trong service layer; controller không được tính điểm.
        - Quiz submission validation phải kiểm tra: learner có active access không, quiz có active không, quiz thuộc course/lesson active không, questions có khớp với quiz không, answer values có hợp lệ không.

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: |
        Sử dụng cú pháp lệnh mới nhất của Speckit cho lệnh speckit.tasks.

        Bạn BẮT BUỘC phải đọc các file sau trước khi tạo file tasks.md:
        - DATABASE.md
        - AGENTS.md
        - PROJECT_AGENTS.md
        - frontend/DESIGN.md
        - backend/.env.example
        - frontend/.env.example
        - {{ inputs.feature_dir }}/context.md
        - {{ inputs.feature_dir }}/spec.md
        - {{ inputs.feature_dir }}/plan.md

        Tạo các nhiệm vụ (tasks) nhỏ gọn (atomic), có thứ tự phụ thuộc rõ ràng (dependency-ordered), và có thể kiểm thử được cho tính năng feat-quiz-system.
        Mỗi nhiệm vụ phải tham chiếu đến các yêu cầu trong tài liệu đặc tả (spec) và bao gồm các điều kiện nghiệm thu hoàn thành (done criteria) rõ ràng.
        Bao gồm các kịch bản kiểm thử (tests) cho: signed-in learner xem active quizzes trong accessible course, learner không có access bị từ chối, draft/inactive quiz không hiển thị, start quiz với safe question payload (không correct_answer/explanation trước submission), quiz với no active questions unavailable, submit valid answers cho single_choice/multiple_choice/true_false, backend auto-grade tính đúng score/max score/passed status, submit với unknown/duplicate question ids bị reject, submit với malformed answer values bị reject, frontend-provided score/max score/passed bị ignore, timed quiz late submission bị reject, learner xem result của chính mình sau submission, learner chưa submit không được xem result, learner không xem được submission của learner khác, learner xem submission history của chính mình, learner không có submission trả về empty history, learner request history cho course không access bị từ chối, không include submission của learner khác trong history, multiple-choice scoring order-insensitive và reject extra selections, module boundaries (Auth/User, Course, Enrollment/Access), không expose sensitive data (JWT, password hashes, cookie values, correct_answer trước submission, payment internals, secrets, submission data của learner khác), error responses follow project response shape { success, message, code, details }, fail safely khi dependencies unavailable, frontend quiz screens bám frontend/DESIGN.md, sử dụng đúng biến môi trường từ backend/.env.example và frontend/.env.example.
        Không bao gồm việc thực thi hay chạy code trong workflow này.