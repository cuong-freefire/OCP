schema_version: "1.0"
workflow:
  id: "feat-learning-flow"
  name: "Workflow Learning Flow"
  version: "1.0.0"
  author: "Đội ngũ OCP"
  description: "Tạo tài liệu bối cảnh learning flow, sau đó chạy các lệnh đặc tả (specify), lập kế hoạch (plan) và tạo nhiệm vụ (tasks) của Speckit."
  integration: "auto"

requires:
  speckit_version: ">=0.8.18"
  integrations:
    any:
      - "codex"
      - "claude"
      - "copilot"
      - "gemini"

inputs:
  feature_dir:
    type: string
    default: ".sdd/specs/feat-learning-flow"
    prompt: "Thư mục lưu trữ các tài liệu (artifacts) của tính năng learning flow"
  integration:
    type: string
    default: "auto"
    prompt: "Tích hợp sẽ sử dụng; 'auto' nghĩa là dùng tích hợp đã được khởi tạo của dự án"
  feature:
    type: string
    default: "Xây dựng tính năng Learning Flow OCP bao gồm: học viên đã ghi danh (enrolled learner) có thể truy cập khóa học đã ghi danh, xem dashboard học tập với cấu trúc khóa học (sections, lessons), xem nội dung bài học (lesson content) khi backend xác nhận quyền truy cập, đánh dấu tiến độ bài học (lesson progress) cho chính mình, hệ thống tự động cập nhật tiến độ khóa học (course progress), tính năng tiếp tục học (continue learning) từ bài học phù hợp nhất, và hỗ trợ khóa bài học tuần tự (sequential lesson locking) khi được bật. Backend là nguồn quyết định quyền học thật sự; frontend chỉ hỗ trợ trải nghiệm người dùng. Learning Flow sử dụng định danh từ Auth module, cấu trúc khóa học từ Course module, và quyết định quyền truy cập từ Enrollment/Access module mà không sở hữu dữ liệu của các module đó. Nội dung bài học trả phí (paid lesson content) chỉ được trả về khi Enrollment/Access xác nhận quyền truy cập hợp lệ. Frontend không được quyết định payment status, enrollment status, course access, lesson unlock, learner identity, role, hoặc tiến độ của learner khác. Không bao gồm: public course browsing, course/section/lesson management, enrollment creation, payment checkout, quiz, final project, certificate, video playback tracking, automatic completion, notes, bookmarks, comments, discussion, Q&A, AI recommendations, gamification, reminders, admin report dashboards, và cross-course reporting."
    prompt: "Mô tả tính năng Learning Flow"

steps:
  - id: context
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: |
      Tạo tài liệu bối cảnh tính năng (feature context) tại đường dẫn {{ inputs.feature_dir }}/context.md cho tính năng feat-learning-flow.

      Bạn BẮT BUỘC phải đọc các file sau trước khi viết tài liệu bối cảnh:
      - DATABASE.md
      - AGENTS.md
      - PROJECT_AGENTS.md
      - frontend/DESIGN.md
      - backend/.env.example
      - frontend/.env.example

      Sử dụng các quy tắc của dự án OCP từ các file trên như các ràng buộc bắt buộc.
      Tài liệu bối cảnh BẮT BUỘC phải sử dụng chính xác các phần sau:
      1. PROBLEM STATEMENT (Tuyên bố bài toán)
      2. DOMAIN KNOWLEDGE (Kiến thức chuyên môn / Nghiệp vụ)
      3. STAKEHOLDERS (Các bên liên quan)
      4. CONSTRAINTS (Các ràng buộc)
      5. ASSUMPTIONS (Các giả định)
      6. OPEN QUESTIONS (Các câu hỏi còn bỏ ngỏ)

      Phạm vi tính năng:
      {{ inputs.feature }}

      Bao gồm các ràng buộc learning flow sau:
      - Learning Flow yêu cầu session backend-authenticated hợp lệ cho mọi hành vi protected learning.
      - Backend-authenticated identity là nguồn duy nhất cho learner user id; KHÔNG chấp nhận frontend-supplied user id, role, enrollment state, payment state, hoặc course access state.
      - Quyền truy cập khóa học phải được xác nhận qua Enrollment/Access authority trước khi trả về nội dung bài học trả phí.
      - Learning Flow KHÔNG đọc hoặc quyết định payment status trực tiếp; quyết định unlock khóa học trả phí thuộc về Payment/Enrollment/Access module.
      - Hệ thống trả về learning view với course summary, ordered sections, ordered active lessons, lesson states, progress summary, và continue-learning target.
      - Lesson states phải phân biệt ít nhất COMPLETED, IN_PROGRESS, LOCKED, và NOT_STARTED cho learner hiện tại.
      - Course progress được tính từ completed required active lessons chia cho total required active lessons theo cấu trúc khóa học hiện tại.
      - Progress trả về 0% khi khóa học không có required active lessons.
      - Continue-learning target là bài học unfinished đầu tiên có sẵn cho learner theo các quy tắc access và lock hiện tại.
      - Khi tất cả required active lessons đã completed, course progress được đánh dấu completed và không cần unfinished continue-learning target.
      - Lesson phải tồn tại, active, thuộc cấu trúc khóa học active, và có sẵn cho learner hiện tại trước khi trả về full lesson content.
      - KHÔNG trả về protected lesson content, protected video URL, hoặc protected body content khi learner thiếu course access hoặc lesson bị lock.
      - Có thể trả về safe lesson metadata cho locked lessons khi cần cho navigation, nhưng phải chỉ rõ locked state.
      - Learner có thể đánh dấu lesson available là in progress hoặc completed cho chính mình.
      - Tạo hoặc update một lesson progress record per learner và lesson; ngăn chặn duplicate progress records cho cùng learner và lesson.
      - Marking lesson completed ghi lại completion time cho learner khi lesson đầu tiên trở thành completed.
      - Lặp lại completed update cho cùng learner và lesson phải idempotent và KHÔNG reset historical completion theo cách làm hỏng progress.
      - Update lesson progress phải recalculate hoặc synchronize course progress cho cùng learner và course.
      - Ngăn chặn progress updates cho lessons learner hiện tại không thể access.
      - Ngăn chặn progress updates cho lessons bị lock bởi sequential learning rules.
      - Khi sequential learning được bật cho khóa học, lesson active đầu tiên available mặc định sau khi course access được xác nhận.
      - Khi sequential learning được bật, mỗi lesson active sau đó remain locked cho đến khi previous required active lesson được completed bởi cùng learner.
      - Khi sequential learning KHÔNG được bật, previous-lesson completion KHÔNG được yêu cầu như điều kiện thêm để mở active lessons.
      - Backend phải enforce lesson locking và content access ngay cả khi learner trực tiếp request lesson thay vì navigate qua frontend.
      - Frontend có thể display learning locks, progress, và continue-learning navigation cho UX, nhưng KHÔNG được treated là authority cho real access hoặc completion.
      - Learning module data ownership giới hạn ở learner progress; sử dụng approved cross-module contracts cho Auth/User identity, Course structure, và Enrollment/Access.
      - Learning responses chỉ bao gồm data cần thiết cho learning experience; KHÔNG expose password hashes, JWT values, cookie values, payment internals, raw SQL errors, raw persistence errors, secrets, hoặc progress của learner khác.
      - Learning request bodies và route parameters quan trọng phải được validated trước khi business behavior chạy.
      - Error responses phải follow project response shape { success, message, code, details } hoặc approved equivalent và tránh raw stack traces hoặc raw infrastructure details.
      - Hệ thống phải fail safely khi required Auth, Course, hoặc Enrollment/Access dependencies không thể confirm identity, course structure, hoặc access.
      - Learning progress records phải được retained cho audit và continuity trừ khi spec approved sau này định nghĩa deletion hoặc archival behavior.
      - Hệ thống phải hỗ trợ future quiz, final project, report, và certificate features bằng cách expose reliable progress state mà không implement những workflows đó trong feature này.

      Không triển khai code. Chỉ tạo mới hoặc cập nhật file context.md.

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: |
        SPECIFY_FEATURE_DIRECTORY={{ inputs.feature_dir }}

        Sử dụng cú pháp lệnh mới nhất của Speckit cho lệnh speckit.specify.

        Bạn BẮT BUỘC phải đọc các file sau trước khi tạo file spec.md:
        - DATABASE.md
        - AGENTS.md
        - PROJECT_AGENTS.md
        - frontend/DESIGN.md
        - backend/.env.example
        - frontend/.env.example
        - {{ inputs.feature_dir }}/context.md

        Tạo đặc tả tính năng (feature specification) cho tính năng feat-learning-flow.

        Phạm vi tính năng:
        {{ inputs.feature }}

        Hành vi bắt buộc:
        - Học viên đã ghi danh (enrolled learner) có thể mở khóa học đã ghi danh và xem cấu trúc learning với sections, lessons, personal progress, lesson states, và continue-learning target rõ ràng.
        - Học viên đã sign-in có thể mở lesson chỉ khi backend rules confirm learner có course access và lesson available theo course learning rules.
        - Learner có thể mark lesson progress của chính mình, và hệ thống update cả lesson-level và course-level progress cho learner đó.
        - Learner có thể resume course từ lesson unfinished phù hợp nhất thay vì manually search qua course structure.
        - Khi khóa học yêu cầu sequential learning, learners phải complete earlier lessons trước khi access later lessons. Backend enforce rule này cho cả lesson content và progress updates.
        - Learning Flow sử dụng trusted Auth identity, Course structure, và Enrollment/Access decisions mà không taking ownership của những modules' data hoặc duplicating business rules của họ.
        - Learning decisions sử dụng authenticated backend user, course structure từ Course module, và course access từ Enrollment/Access contract.
        - Paid course content phải remain hidden trừ khi active course access được confirm bởi Enrollment/Access authority.
        - Payment PENDING, failed payment, cancelled enrollment, refunded enrollment, hoặc inactive enrollment phải KHÔNG BAO GIỜ unlock learning content.
        - Learners phải KHÔNG thể create, update, hoặc view progress của learner khác.
        - Repeated completion của cùng lesson phải idempotent và phải KHÔNG create duplicate lesson progress.
        - Khóa học với no active lessons phải return zero progress thay vì divide by zero hoặc mark course complete by accident.
        - Inactive hoặc deleted lessons phải KHÔNG count như required active lessons cho new progress calculation, trong khi historical progress có thể remain cho audit và continuity.
        - Nếu lesson order thay đổi sau learner có progress, next learning target và progress percentage phải được recalculate từ current active course structure.
        - Sequential locking phải ignore inactive hoặc deleted lessons khi determining previous và next active lessons.
        - Locked lessons có thể appear như metadata cho navigation, nhưng protected content của họ phải KHÔNG được returned.
        - Frontend route guards, visible buttons, hidden links, hoặc cached browser state phải KHÔNG BAO GIỜ grant real learning access.
        - Preview/public course browsing được handle bởi Course module; Learning Flow spec này KHÔNG làm protected Learning APIs public.
        - Spec phải ghi rõ các biến môi trường cần thiết dựa trên backend/.env.example và frontend/.env.example, gồm API base URL, CORS origin, database URL, auth session và cookies config, và token lifetime.
        - Backend implementation được phép load backend/.env bằng dotenv và đọc qua process.env, nhưng không được log hoặc trả về secret env value. Chỉ được nhắc tên biến trong log/error/docs.
        - Giữ vững ranh giới của module learning; các module khác sẽ sử dụng dữ liệu thông qua các giao ước (contracts) của Learning.
        - Xác định rõ ràng các phần nằm ngoài phạm vi (out-of-scope): public course browsing, course catalog search, category display, và public preview content behavior owned by Course module; course, section, lesson, category, content, thumbnail, hoặc lesson order management; enrollment creation, free course enrollment, payment checkout, VNPAY processing, payment verification, order status updates, và payment-driven access unlock; auth registration, email verification, login, logout, refresh-token rotation, password reset, Google OAuth, và profile management; quiz authoring, quiz taking, quiz scoring, quiz submissions, và quiz-based lesson gating; final project submission, mentor review, mentor feedback, và final project pass/fail decisions; certificate generation, certificate eligibility, certificate storage, và certificate download; video playback-duration tracking, automatic completion từ watch percentage, realtime progress sync, notes, bookmarks, comments, discussion, Q&A, AI recommendations, gamification, và reminders; admin report dashboards, analytics snapshots, và cross-course reporting beyond making learner progress state reliable cho future readers.

        Các quyết định sản phẩm đã được thông qua:
        - Learners phải sign-in trước khi sử dụng protected Learning Flow behavior.
        - Active course access được determine bởi Payment/Enrollment/Access module, bao gồm free enrollment và paid enrollment sau verified successful payment.
        - Course structure, section order, lesson order, lesson activity, và lesson preview/public metadata được owned bởi Course module.
        - Sequential learning được control bởi course-level rule hoặc equivalent Course-module-provided policy. Nếu policy đó absent hoặc disabled, lessons không bị lock bởi previous-lesson completion.
        - Required active lessons exclude inactive, deleted, archived, hoặc otherwise unavailable lessons từ new progress calculation.
        - Lesson completion là explicit trong MVP này; video watch duration và automatic completion bởi playback percentage được defer.
        - Existing progress có thể remain ngay cả khi lesson sau đó trở thành inactive hoặc deleted, nhưng new course progress calculations sử dụng current active course structure.
        - Learning Flow có thể expose stable progress information cho future quiz, final project, certificate, hoặc report features, nhưng những features define eligibility và business rules của họ trong separate specs.
        - Frontend learning screens có thể improve navigation và feedback, nhưng tất cả real access, lock, identity, và ownership decisions remain backend-controlled.

        Không bao gồm các chi tiết triển khai mã nguồn nằm ngoài yêu cầu đặc tả của Speckit.

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: |
        Sử dụng cú pháp lệnh mới nhất của Speckit cho lệnh speckit.plan.

        Bạn BẮT BUỘC phải đọc các file sau trước khi tạo file plan.md:
        - DATABASE.md
        - AGENTS.md
        - PROJECT_AGENTS.md
        - frontend/DESIGN.md
        - backend/.env.example
        - frontend/.env.example
        - {{ inputs.feature_dir }}/context.md
        - {{ inputs.feature_dir }}/spec.md

        Các ràng buộc kỹ thuật:
        - Backend: REST API viết bằng NodeJS + JavaScript ESM theo phong cách Express; dùng package.json "type": "module" và import/export; không dùng TypeScript hoặc CommonJS cho scope hiện tại.
        - Frontend: React + JSX + Bootstrap bằng Create React App/react-scripts; API client phải gửi cookie bằng withCredentials: true.
        - Frontend UI: Bắt buộc đọc và bám frontend/DESIGN.md khi lập kế hoạch các trang learning dashboard, lesson viewing, progress tracking, và continue learning navigation.
        - Env config: Bắt buộc dùng đúng tên biến trong backend/.env.example và frontend/.env.example. Backend load backend/.env bằng dotenv và đọc qua process.env. Backend dùng FRONTEND_ORIGIN, DATABASE_URL, AUTH_SECRET, COOKIE_ACCESS_NAME, COOKIE_REFRESH_NAME, JWT_ACCESS_EXPIRES_IN, JWT_REFRESH_EXPIRES_IN. Frontend dùng REACT_APP_API_BASE_URL; không dùng VITE_*.
        - Package manager: npm. Root/backend/frontend scripts dùng npm, không dùng pnpm/yarn trong scope này.
        - Frontend env variables dùng prefix REACT_APP_, hiện cần REACT_APP_API_BASE_URL; không dùng VITE_.
        - Test setup đã duyệt: backend dùng node:test + assert + supertest; frontend dùng node:test cho API client/source-rule tests nhẹ; không thêm Jest/Vitest/Cypress nếu chưa được duyệt.
        - ORM/Cơ sở dữ liệu: Prisma + MySQL.
        - Kiểm tra dữ liệu đầu vào (Validation): Sử dụng Zod cho body/query/params quan trọng.
        - Xác thực (Auth): JWT lưu trong Cookie httpOnly; Learning Flow sử dụng backend-authenticated session identity từ Auth module.
        - Cookie/CORS auth: sameSite = "lax", secure = false ở local dev, secure = true ở production, CORS exact FRONTEND_ORIGIN + credentials: true, không wildcard origin khi gửi cookie.
        - Module boundaries: Learning Flow sử dụng Auth/User identity, Course structure, và Enrollment/Access decisions qua approved contracts; không import Prisma trực tiếp trong service, không query trực tiếp table của module khác.
        - Các Controller không được chứa logic nghiệp vụ (business logic).
        - Các Service không được phép import trực tiếp thư viện Prisma.
        - Các Repository nắm quyền truy cập và thao tác với cơ sở dữ liệu.
        - Không lưu trữ các thông tin thô như: JWT thô, password hashes, cookie values, payment internals, raw SQL errors, raw persistence errors, secrets, hoặc progress của learner khác.
        - Sử dụng các giao ước (contracts) từ phía backend để quản lý định danh và quyền truy cập; các bộ bảo vệ (guards) ở frontend chỉ phục vụ cho trải nghiệm người dùng (UX).
        - Learning module data ownership giới hạn ở learner progress (lesson_progress, course_progress); sử dụng approved cross-module contracts cho Auth/User identity, Course structure, và Enrollment/Access.

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: |
        Sử dụng cú pháp lệnh mới nhất của Speckit cho lệnh speckit.tasks.

        Bạn BẮT BUỘC phải đọc các file sau trước khi tạo file tasks.md:
        - DATABASE.md
        - AGENTS.md
        - PROJECT_AGENTS.md
        - frontend/DESIGN.md
        - backend/.env.example
        - frontend/.env.example
        - {{ inputs.feature_dir }}/context.md
        - {{ inputs.feature_dir }}/spec.md
        - {{ inputs.feature_dir }}/plan.md

        Tạo các nhiệm vụ (tasks) nhỏ gọn (atomic), có thứ tự phụ thuộc rõ ràng (dependency-ordered), và có thể kiểm thử được cho tính năng feat-learning-flow.
        Mỗi nhiệm vụ phải tham chiếu đến các yêu cầu trong tài liệu đặc tả (spec) và bao gồm các điều kiện nghiệm thu hoàn thành (done criteria) rõ ràng.
        Bao gồm các kịch bản kiểm thử (tests) cho: enrolled learner mở learning view, learner không có access bị từ chối, lesson content protection, learner mark lesson progress, course progress recalculation, continue learning target, sequential lesson locking khi enabled, sequential lesson không lock khi disabled, lesson states (COMPLETED, IN_PROGRESS, LOCKED, NOT_STARTED), progress trả về 0% cho khóa học không có active lessons, prevent progress updates cho lessons không thể access, prevent progress updates cho locked lessons, idempotent repeated completion updates, backend enforce lesson locking ngay cả khi direct lesson request, frontend learning screens bám frontend/DESIGN.md, sử dụng đúng biến môi trường từ backend/.env.example và frontend/.env.example, module boundaries (Auth/User, Course, Enrollment/Access), không expose sensitive data (JWT, password hashes, cookie values, payment internals, secrets, progress của learner khác), error responses follow project response shape, fail safely khi dependencies unavailable, và retain learning progress records cho audit.
        Không bao gồm việc thực thi hay chạy code trong workflow này.
