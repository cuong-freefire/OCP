schema_version: '1.0'
workflow:
  id: feat-auth
  name: OCP Auth Context Spec Plan Tasks
  version: 1.0.0
  author: OCP Team
  description: Creates auth context, then runs Speckit specify, plan, and tasks commands.
  integration: auto
requires:
  speckit_version: '>=0.8.18'
  integrations:
    any:
    - codex
    - claude
    - copilot
    - gemini
inputs:
  feature_dir:
    type: string
    default: .sdd/specs/001-auth
    prompt: Feature directory for auth artifacts
  integration:
    type: string
    default: auto
    prompt: Integration to use; auto uses the initialized project integration
  feature:
    type: string
    default: Build the OCP authentication feature with local email/password auth,
      email OTP verification, Google OAuth login/linking, JWT httpOnly cookie session,
      bcrypt password hashing, local-account password reset, authenticated set-password
      for Google-only users, profile access, role-aware backend authorization, blocked/deleted
      user rejection, and frontend withCredentials support. Backend remains the source
      of truth. Do not use Bearer auth, localStorage JWT, frontend role authority,
      raw OAuth token storage, or user-entered Google credentials.
    prompt: Auth feature description
steps:
- id: context
  type: prompt
  integration: '{{ inputs.integration }}'
  prompt: 'Create the feature context document at {{ inputs.feature_dir }}/context.md
    for feat-auth.


    You MUST read these files before writing context:

    - DATABASE.md

    - AGENTS.md

    - PROJECT_AGENTS.md


    Use the OCP project rules from those files as binding constraints.

    Context document MUST use these sections exactly:

    1. PROBLEM STATEMENT

    2. DOMAIN KNOWLEDGE

    3. STAKEHOLDERS

    4. CONSTRAINTS

    5. ASSUMPTIONS

    6. OPEN QUESTIONS


    Feature scope:

    {{ inputs.feature }}


    Include these auth constraints:

    - JWT is stored only in httpOnly Cookie.

    - Backend reads auth token from req.cookies.

    - Frontend sends credentials with withCredentials: true.

    - Local auth uses bcrypt and users.password_hash.

    - Google OAuth maps users through oauth_accounts.provider = GOOGLE and provider_user_id
    = Google sub.

    - Do not store Google id_token, access_token, or refresh_token in database or
    logs.

    - Local registration verifies email with a six-digit OTP, not a user-facing raw
    token/link.

    - Verification OTP expires after 10 minutes, allows at most 5 failed attempts,
    and resend uses a 60-second cooldown.

    - Email delivery uses Nodemailer SMTP; app startup can continue without SMTP config,
    but registration/reset email sends fail safely.

    - Google login UI never asks users to type or paste raw OAuth credentials; missing
    Google config shows a safe not-configured state.

    - Do not trust frontend-sent email, role, providerUserId, amount, payment status,
    or course access.

    - User blocked/deleted status must reject local and Google login.

    - Payment provider is separate from identity provider: payments.provider = VNPAY,
    oauth_accounts.provider = GOOGLE.


    Do not implement code. Only create or update context.md.

    '
- id: specify
  command: speckit.specify
  integration: '{{ inputs.integration }}'
  input:
    args: 'SPECIFY_FEATURE_DIRECTORY={{ inputs.feature_dir }}


      Use the latest Speckit command semantics for speckit.specify.


      You MUST read these files before generating spec.md:

      - DATABASE.md

      - AGENTS.md

      - PROJECT_AGENTS.md

      - {{ inputs.feature_dir }}/context.md


      Generate the feature specification for feat-auth.


      Feature scope:

      {{ inputs.feature }}


      Required behavior:

      - Register learner with email/password.

      - Login/logout using JWT in httpOnly Cookie.

      - Read current user/profile from backend session.

      - Verify email using a six-digit OTP stored only as a non-raw proof.

      - Reset password for existing local accounts using a hashed one-time reset token.

      - Allow authenticated Google-only users to create their first local password
      only from inside the app.

      - Support Google OAuth login/linking using oauth_accounts.

      - Keep the Google sign-in button visible when Google config is missing, but
      clicking it only shows a safe not-configured state and never asks for raw OAuth
      credentials.

      - Reject blocked/deleted users for all login methods.

      - Enforce backend source of truth for role/userId/access.

      - Keep auth module boundaries; other modules consume Auth/User contracts.

      - Define out-of-scope explicitly: payment checkout, enrollment, learning progress,
      admin CRUD, course CRUD.


      Resolved product decisions:

      - Pending-verification local users MUST NOT receive a login session until email
      verification succeeds.

      - Registration creates a pending_verification user immediately and activates
      it only after valid OTP verification.

      - Verification OTP is 6 digits, expires after 10 minutes, allows at most 5 failed
      attempts, and resend is limited by a 60-second cooldown.

      - Email delivery uses Nodemailer SMTP. The app may start without SMTP config,
      but registration/reset email sending must fail safely and must not silently
      succeed.

      - Google OAuth users with backend-verified Google email may be created as email_verified
      active learner accounts.

      - If a backend-verified Google email matches an existing active OCP user email
      but no oauth_accounts link exists, create the OAuth link for that existing user
      and start the normal secure session.

      - Public password reset must not create the first local password for Google-only
      users with password_hash = NULL; they must sign in with Google and use authenticated
      in-app set-password.

      - Refresh-token-backed sessions are in scope. Store only refresh token hashes
      in refresh_tokens; rotate/revoke refresh tokens on refresh/logout.

      - Cookie names: ocp_access_token and ocp_refresh_token.

      - Middleware attaches trusted identity to req.user.

      - Password reset token expiry: 30 minutes. Refresh token expiry: 7 days. Access
      token expiry: 15 minutes.


      Must not include implementation details beyond what Speckit spec requires.

      '
- id: plan
  command: speckit.plan
  integration: '{{ inputs.integration }}'
  input:
    args: 'Use the latest Speckit command semantics for speckit.plan.


      You MUST read these files before generating plan.md:

      - DATABASE.md

      - AGENTS.md

      - PROJECT_AGENTS.md

      - {{ inputs.feature_dir }}/context.md

      - {{ inputs.feature_dir }}/spec.md


      Technical constraints:

      - Backend: NodeJS Express-style REST API.

      - ORM/database: Prisma + MySQL.

      - Validation: Zod for body/query/params.

      - Auth: JWT httpOnly Cookie, bcrypt, Google OAuth.

      - Email: Nodemailer SMTP adapter; startup does not require SMTP config but email
      send operations fail safely when missing.

      - Email verification: six-digit OTP, 10-minute expiry, 5 failed attempts, 60-second
      resend cooldown.

      - Data model must align with users, refresh_tokens, email_verifications, password_reset_tokens,
      oauth_accounts.

      - Controllers must not contain business logic.

      - Services must not import Prisma directly.

      - Repositories own database access.

      - Do not store raw JWT, raw reset tokens, raw verification OTPs, raw Google
      tokens, SMTP credentials, password plain text, or secrets.

      - Use backend contracts for identity/session; frontend guards are UX only.

      '
- id: tasks
  command: speckit.tasks
  integration: '{{ inputs.integration }}'
  input:
    args: 'Use the latest Speckit command semantics for speckit.tasks.


      You MUST read these files before generating tasks.md:

      - DATABASE.md

      - AGENTS.md

      - PROJECT_AGENTS.md

      - {{ inputs.feature_dir }}/context.md

      - {{ inputs.feature_dir }}/spec.md

      - {{ inputs.feature_dir }}/plan.md


      Generate atomic, dependency-ordered, testable tasks for feat-auth.

      Each task must reference spec requirements and include clear done criteria.

      Include tests for local auth, OTP verification, OTP expiry, OTP failed-attempt
      lock, OTP resend cooldown, Nodemailer missing-config failure, Google OAuth,
      verified Google email auto-linking, Google-only authenticated set-password,
      Google missing-config UI, cookie behavior, validation errors, blocked/deleted
      user rejection, duplicate email/account linking policy, and secret/token/OTP
      leakage prevention.

      Do not include implementation execution in this workflow.

      '
