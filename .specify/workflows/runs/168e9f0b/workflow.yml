schema_version: '1.0'
workflow:
  id: feat-auth
  name: "Workflow T\xEDnh n\u0103ng X\xE1c th\u1EF1c (Auth)"
  version: 1.0.0
  author: "\u0110\u1ED9i ng\u0169 OCP"
  description: "T\u1EA1o t\xE0i li\u1EC7u b\u1ED1i c\u1EA3nh x\xE1c th\u1EF1c (auth\
    \ context), sau \u0111\xF3 ch\u1EA1y c\xE1c l\u1EC7nh \u0111\u1EB7c t\u1EA3 (specify),\
    \ l\u1EADp k\u1EBF ho\u1EA1ch (plan) v\xE0 t\u1EA1o nhi\u1EC7m v\u1EE5 (tasks)\
    \ c\u1EE7a Speckit."
  integration: auto
requires:
  speckit_version: '>=0.8.18'
  integrations:
    any:
    - codex
    - claude
    - copilot
    - gemini
inputs:
  feature_dir:
    type: string
    default: .sdd/specs/001-auth
    prompt: "Th\u01B0 m\u1EE5c l\u01B0u tr\u1EEF c\xE1c t\xE0i li\u1EC7u (artifacts)\
      \ c\u1EE7a t\xEDnh n\u0103ng auth"
  integration:
    type: string
    default: auto
    prompt: "T\xEDch h\u1EE3p s\u1EBD s\u1EED d\u1EE5ng; 'auto' ngh\u0129a l\xE0 d\xF9\
      ng t\xEDch h\u1EE3p \u0111\xE3 \u0111\u01B0\u1EE3c kh\u1EDFi t\u1EA1o c\u1EE7\
      a d\u1EF1 \xE1n"
  feature:
    type: string
    default: "X\xE2y d\u1EF1ng t\xEDnh n\u0103ng x\xE1c th\u1EF1c OCP bao g\u1ED3\
      m: \u0111\u0103ng k\xFD h\u1ECDc vi\xEAn b\u1EB1ng fullName/email/password,\
      \ trong \u0111\xF3 fullName \u0111\u01B0\u1EE3c l\u01B0u \u0111\u1ED3ng b\u1ED9\
      \ v\xE0o users.name v\xE0 backend t\u1EF1 g\xE1n vai tr\xF2 LEARNER; \u0111\u0103\
      ng nh\u1EADp b\u1EB1ng email/m\u1EADt kh\u1EA9u n\u1ED9i b\u1ED9, x\xE1c th\u1EF1\
      c OTP qua email, \u0111\u0103ng nh\u1EADp/li\xEAn k\u1EBFt t\xE0i kho\u1EA3\
      n b\u1EB1ng Google OAuth, phi\xEAn l\xE0m vi\u1EC7c (session) l\u01B0u trong\
      \ JWT httpOnly cookie, m\xE3 h\xF3a m\u1EADt kh\u1EA9u b\u1EB1ng bcrypt, kh\xF4\
      i ph\u1EE5c m\u1EADt kh\u1EA9u cho t\xE0i kho\u1EA3n n\u1ED9i b\u1ED9 b\u1EB1\
      ng OTP email sau khi backend x\xE1c nh\u1EADn email t\u1ED3n t\u1EA1i, thi\u1EBF\
      t l\u1EADp m\u1EADt kh\u1EA9u trong \u1EE9ng d\u1EE5ng (khi \u0111\xE3 \u0111\
      \u0103ng nh\u1EADp) d\xE0nh cho ng\u01B0\u1EDDi d\xF9ng ch\u1EC9 c\xF3 t\xE0\
      i kho\u1EA3n Google, \u0111\u1ECDc th\xF4ng tin ng\u01B0\u1EDDi d\xF9ng hi\u1EC7\
      n t\u1EA1i/h\u1ED3 s\u01A1 c\xE1 nh\xE2n, ph\xE2n quy\u1EC1n ph\xEDa backend\
      \ d\u1EF1a tr\xEAn vai tr\xF2 (role), t\u1EEB ch\u1ED1i ng\u01B0\u1EDDi d\xF9\
      ng b\u1ECB kh\xF3a/x\xF3a, v\xE0 ph\xEDa frontend h\u1ED7 tr\u1EE3 c\u1EA5u\
      \ h\xECnh v\u1EDBi Credentials (withCredentials: true). Backend \u0111\xF3ng\
      \ vai tr\xF2 l\xE0 ngu\u1ED3n d\u1EEF li\u1EC7u chu\u1EA9n duy nh\u1EA5t (source\
      \ of truth). Kh\xF4ng s\u1EED d\u1EE5ng x\xE1c th\u1EF1c Bearer, kh\xF4ng l\u01B0\
      u JWT trong localStorage, kh\xF4ng ph\xE2n quy\u1EC1n d\u1EF1a v\xE0o ph\xED\
      a frontend, kh\xF4ng l\u01B0u tr\u1EEF token OAuth th\xF4 v\xE0 kh\xF4ng y\xEA\
      u c\u1EA7u ng\u01B0\u1EDDi d\xF9ng nh\u1EADp th\xF4ng tin \u0111\u0103ng nh\u1EAD\
      p Google tr\u1EF1c ti\u1EBFp. Registration kh\xF4ng nh\u1EADn ho\u1EB7c upload\
      \ profile image/avatar; avatar_url c\xF3 th\u1EC3 \u0111\u1EC3 null. Upload/c\u1EAD\
      p nh\u1EADt file \u1EA3nh h\u1ED3 s\u01A1 qua public/images l\xE0 ph\u1EA1m\
      \ vi c\u1EE7a profile update feature sau, kh\xF4ng thu\u1ED9c feat-auth hi\u1EC7\
      n t\u1EA1i."
    prompt: "M\xF4 t\u1EA3 t\xEDnh n\u0103ng X\xE1c th\u1EF1c (Auth)"
steps:
- id: context
  type: prompt
  integration: '{{ inputs.integration }}'
  prompt: "T\u1EA1o t\xE0i li\u1EC7u b\u1ED1i c\u1EA3nh t\xEDnh n\u0103ng (feature\
    \ context) t\u1EA1i \u0111\u01B0\u1EDDng d\u1EABn {{ inputs.feature_dir }}/context.md\
    \ cho t\xEDnh n\u0103ng feat-auth.\n\nB\u1EA1n B\u1EAET BU\u1ED8C ph\u1EA3i \u0111\
    \u1ECDc c\xE1c file sau tr\u01B0\u1EDBc khi vi\u1EBFt t\xE0i li\u1EC7u b\u1ED1\
    i c\u1EA3nh:\n- DATABASE.md\n- AGENTS.md\n- PROJECT_AGENTS.md\n- frontend/DESIGN.md\n\
    - backend/.env.example\n- frontend/.env.example\n\nS\u1EED d\u1EE5ng c\xE1c quy\
    \ t\u1EAFc c\u1EE7a d\u1EF1 \xE1n OCP t\u1EEB c\xE1c file tr\xEAn nh\u01B0 c\xE1\
    c r\xE0ng bu\u1ED9c b\u1EAFt bu\u1ED9c.\nT\xE0i li\u1EC7u b\u1ED1i c\u1EA3nh B\u1EAE\
    T BU\u1ED8C ph\u1EA3i s\u1EED d\u1EE5ng ch\xEDnh x\xE1c c\xE1c ph\u1EA7n sau:\n\
    1. PROBLEM STATEMENT (Tuy\xEAn b\u1ED1 b\xE0i to\xE1n)\n2. DOMAIN KNOWLEDGE (Ki\u1EBF\
    n th\u1EE9c chuy\xEAn m\xF4n / Nghi\u1EC7p v\u1EE5)\n3. STAKEHOLDERS (C\xE1c b\xEA\
    n li\xEAn quan)\n4. CONSTRAINTS (C\xE1c r\xE0ng bu\u1ED9c)\n5. ASSUMPTIONS (C\xE1\
    c gi\u1EA3 \u0111\u1ECBnh)\n6. OPEN QUESTIONS (C\xE1c c\xE2u h\u1ECFi c\xF2n b\u1ECF\
    \ ng\u1ECF)\n\nPh\u1EA1m vi t\xEDnh n\u0103ng:\n{{ inputs.feature }}\n\nBao g\u1ED3\
    m c\xE1c r\xE0ng bu\u1ED9c x\xE1c th\u1EF1c (auth) sau:\n- JWT ch\u1EC9 \u0111\
    \u01B0\u1EE3c l\u01B0u tr\u1EEF trong Cookie httpOnly.\n- Backend \u0111\u1ECD\
    c token x\xE1c th\u1EF1c t\u1EEB req.cookies.\n- Frontend g\u1EEDi th\xF4ng tin\
    \ x\xE1c th\u1EF1c v\u1EDBi c\u1EA5u h\xECnh withCredentials: true.\n- Cookie\
    \ auth MVP d\xF9ng sameSite = \"lax\", secure = false \u1EDF local dev, secure\
    \ = true \u1EDF production, v\xE0 kh\xF4ng set domain m\u1EB7c \u0111\u1ECBnh\
    \ tr\u1EEB khi c\u1EA5u h\xECnh deploy y\xEAu c\u1EA7u.\n- CORS ph\u1EA3i allow\
    \ ch\xEDnh x\xE1c FRONTEND_ORIGIN v\xE0 credentials: true; kh\xF4ng d\xF9ng wildcard\
    \ origin khi g\u1EEDi cookie.\n- MVP same-site ch\u01B0a b\u1EAFt bu\u1ED9c CSRF\
    \ token; n\u1EBFu ph\u1EA3i d\xF9ng cross-site cookie SameSite=None th\xEC ph\u1EA3\
    i b\u1ED5 sung CSRF protection tr\u01B0\u1EDBc khi implement endpoint state-changing.\n\
    - X\xE1c th\u1EF1c n\u1ED9i b\u1ED9 s\u1EED d\u1EE5ng bcrypt v\xE0 tr\u01B0\u1EDD\
    ng users.password_hash.\n- Google OAuth \xE1nh x\u1EA1 ng\u01B0\u1EDDi d\xF9ng\
    \ qua b\u1EA3ng oauth_accounts v\u1EDBi provider = GOOGLE v\xE0 provider_user_id\
    \ = Google sub.\n- Kh\xF4ng l\u01B0u tr\u1EEF c\xE1c token id_token, access_token,\
    \ ho\u1EB7c refresh_token c\u1EE7a Google v\xE0o c\u01A1 s\u1EDF d\u1EEF li\u1EC7\
    u ho\u1EB7c nh\u1EADt k\xFD h\u1EC7 th\u1ED1ng (logs).\n- \u0110\u0103ng k\xFD\
    \ t\xE0i kho\u1EA3n n\u1ED9i b\u1ED9 c\u1EA7n x\xE1c th\u1EF1c email b\u1EB1ng\
    \ m\xE3 OTP g\u1ED3m 6 ch\u1EEF s\u1ED1, kh\xF4ng g\u1EEDi chu\u1ED7i token/\u0111\
    \u01B0\u1EDDng link th\xF4 tr\u1EF1c ti\u1EBFp cho ng\u01B0\u1EDDi d\xF9ng.\n\
    - \u0110\u0103ng k\xFD t\xE0i kho\u1EA3n h\u1ECDc vi\xEAn b\u1EAFt bu\u1ED9c nh\u1EAD\
    n fullName, email, password; fullName map v\xE0o users.name; backend t\u1EF1 g\xE1\
    n role LEARNER t\u1EEB roles.code = \"LEARNER\"; frontend kh\xF4ng \u0111\u01B0\
    \u1EE3c g\u1EEDi role.\n- Registration kh\xF4ng nh\u1EADn profile image/avatar,\
    \ kh\xF4ng upload image, v\xE0 c\xF3 th\u1EC3 \u0111\u1EC3 users.avatar_url =\
    \ NULL. Upload/c\u1EADp nh\u1EADt file \u1EA3nh h\u1ED3 s\u01A1 qua public/images\
    \ l\xE0 ph\u1EA1m vi profile update feature sau, kh\xF4ng thu\u1ED9c feat-auth\
    \ hi\u1EC7n t\u1EA1i.\n- M\xE3 OTP x\xE1c th\u1EF1c email s\u1EBD h\u1EBFt h\u1EA1\
    n sau 10 ph\xFAt, cho ph\xE9p th\u1EED sai t\u1ED1i \u0111a 5 l\u1EA7n, v\xE0\
    \ th\u1EDDi gian ch\u1EDD (cooldown) \u0111\u1EC3 g\u1EEDi l\u1EA1i m\xE3 l\xE0\
    \ 60 gi\xE2y. Khi resend OTP x\xE1c th\u1EF1c email, OTP c\u0169 ch\u01B0a d\xF9\
    ng ph\u1EA3i b\u1ECB v\xF4 hi\u1EC7u h\xF3a v\xE0 ch\u1EC9 OTP m\u1EDBi nh\u1EA5\
    t c\xF2n hi\u1EC7u l\u1EF1c.\n- Khi x\xE1c th\u1EF1c email b\u1EB1ng OTP th\xE0\
    nh c\xF4ng, backend ph\u1EA3i chuy\u1EC3n user sang active/email_verified v\xE0\
    \ c\u1EA5p cookie ocp_access_token + ocp_refresh_token \u0111\u1EC3 ng\u01B0\u1EDD\
    i d\xF9ng \u0111\u01B0\u1EE3c \u0111\u0103ng nh\u1EADp ngay.\n- Kh\xF4i ph\u1EE5\
    c m\u1EADt kh\u1EA9u d\xF9ng OTP g\u1EEDi qua email, kh\xF4ng d\xF9ng reset token/link\
    \ cho ng\u01B0\u1EDDi d\xF9ng. Reset OTP l\xE0 m\xE3 6 ch\u1EEF s\u1ED1, h\u1EBF\
    t h\u1EA1n sau 10 ph\xFAt, cho ph\xE9p th\u1EED sai t\u1ED1i \u0111a 5 l\u1EA7\
    n, v\xE0 resend cooldown l\xE0 60 gi\xE2y. Khi resend reset OTP, OTP c\u0169 ch\u01B0\
    a d\xF9ng ph\u1EA3i b\u1ECB v\xF4 hi\u1EC7u h\xF3a v\xE0 ch\u1EC9 OTP m\u1EDB\
    i nh\u1EA5t c\xF2n hi\u1EC7u l\u1EF1c.\n- Backend ph\u1EA3i ki\u1EC3m tra email\
    \ c\xF3 t\u1ED3n t\u1EA1i v\xE0 l\xE0 t\xE0i kho\u1EA3n local c\xF3 password_hash\
    \ tr\u01B0\u1EDBc khi t\u1EA1o/g\u1EEDi OTP reset; kh\xF4ng t\u1EA1o OTP reset\
    \ cho email kh\xF4ng t\u1ED3n t\u1EA1i ho\u1EB7c Google-only user. Public forgot-password\
    \ response ph\u1EA3i d\xF9ng th\xF4ng b\xE1o chung \u0111\u1EC3 tr\xE1nh d\xF2\
    \ email \u0111\xE3 \u0111\u0103ng k\xFD.\n- Vi\u1EC7c g\u1EEDi email s\u1EED d\u1EE5\
    ng Nodemailer SMTP; \u1EE9ng d\u1EE5ng khi kh\u1EDFi \u0111\u1ED9ng v\u1EABn c\xF3\
    \ th\u1EC3 ti\u1EBFp t\u1EE5c n\u1EBFu thi\u1EBFu c\u1EA5u h\xECnh SMTP, nh\u01B0\
    ng c\xE1c thao t\xE1c g\u1EEDi email \u0111\u0103ng k\xFD/kh\xF4i ph\u1EE5c m\u1EAD\
    t kh\u1EA9u ph\u1EA3i th\u1EA5t b\u1EA1i m\u1ED9t c\xE1ch an to\xE0n (fail safely).\n\
    - Giao di\u1EC7n \u0111\u0103ng nh\u1EADp Google tuy\u1EC7t \u0111\u1ED1i kh\xF4\
    ng y\xEAu c\u1EA7u ng\u01B0\u1EDDi d\xF9ng nh\u1EADp ho\u1EB7c d\xE1n th\xF4ng\
    \ tin \u0111\u0103ng nh\u1EADp OAuth th\xF4; n\u1EBFu thi\u1EBFu c\u1EA5u h\xEC\
    nh Google \u1EDF ph\xEDa backend, giao di\u1EC7n ph\u1EA3i hi\u1EC3n th\u1ECB\
    \ tr\u1EA1ng th\xE1i an to\xE0n l\xE0 \"ch\u01B0a \u0111\u01B0\u1EE3c c\u1EA5\
    u h\xECnh\".\n- V\u1EDBi Google OAuth, kh\xF4ng tin t\u01B0\u1EDFng email/name/avatar/providerUserId\
    \ do frontend t\u1EF1 g\u1EEDi n\u1EBFu ch\u01B0a \u0111\u01B0\u1EE3c backend\
    \ verify t\u1EEB Google token. V\u1EDBi m\u1ECDi flow, kh\xF4ng tin role, userId,\
    \ account status ho\u1EB7c quy\u1EC1n truy c\u1EADp do frontend g\u1EEDi.\n- Tr\u1EA1\
    ng th\xE1i ng\u01B0\u1EDDi d\xF9ng b\u1ECB kh\xF3a (blocked) ho\u1EB7c b\u1ECB\
    \ x\xF3a (deleted) ph\u1EA3i t\u1EEB ch\u1ED1i c\u1EA3 ph\u01B0\u01A1ng th\u1EE9\
    c \u0111\u0103ng nh\u1EADp n\u1ED9i b\u1ED9 v\xE0 \u0111\u0103ng nh\u1EADp Google.\n\
    - Nh\xE0 cung c\u1EA5p d\u1ECBch v\u1EE5 thanh to\xE1n \u0111\u1ED9c l\u1EADp\
    \ v\u1EDBi nh\xE0 cung c\u1EA5p d\u1ECBch v\u1EE5 \u0111\u1ECBnh danh: payments.provider\
    \ = VNPAY, oauth_accounts.provider = GOOGLE.\n- M\u1ECDi trang/giao di\u1EC7n\
    \ Auth ph\xEDa frontend ph\u1EA3i b\xE1m theo frontend/DESIGN.md v\u1EC1 b\u1ED1\
    \ c\u1EE5c, visual style, component style, tr\u1EA1ng th\xE1i UI v\xE0 UX. Kh\xF4\
    ng t\u1EF1 t\u1EA1o h\u01B0\u1EDBng thi\u1EBFt k\u1EBF tr\xE1i v\u1EDBi DESIGN.md.\n\
    - C\xE1c bi\u1EBFn m\xF4i tr\u01B0\u1EDDng ph\u1EA3i d\xF9ng \u0111\xFAng t\xEA\
    n trong backend/.env.example v\xE0 frontend/.env.example. Kh\xF4ng t\u1EF1 \u0111\
    \u1EB7t t\xEAn bi\u1EBFn kh\xE1c cho c\xF9ng m\u1ED9t \xFD ngh\u0129a.\n\nKh\xF4\
    ng tri\u1EC3n khai code. Ch\u1EC9 t\u1EA1o m\u1EDBi ho\u1EB7c c\u1EADp nh\u1EAD\
    t file context.md.\n"
- id: specify
  command: speckit.specify
  integration: '{{ inputs.integration }}'
  input:
    args: "SPECIFY_FEATURE_DIRECTORY={{ inputs.feature_dir }}\n\nS\u1EED d\u1EE5ng\
      \ c\xFA ph\xE1p l\u1EC7nh m\u1EDBi nh\u1EA5t c\u1EE7a Speckit cho l\u1EC7nh\
      \ speckit.specify.\n\nB\u1EA1n B\u1EAET BU\u1ED8C ph\u1EA3i \u0111\u1ECDc c\xE1\
      c file sau tr\u01B0\u1EDBc khi t\u1EA1o file spec.md:\n- DATABASE.md\n- AGENTS.md\n\
      - PROJECT_AGENTS.md\n- frontend/DESIGN.md\n- backend/.env.example\n- frontend/.env.example\n\
      - {{ inputs.feature_dir }}/context.md\n\nT\u1EA1o \u0111\u1EB7c t\u1EA3 t\xED\
      nh n\u0103ng (feature specification) cho t\xEDnh n\u0103ng feat-auth.\n\nPh\u1EA1\
      m vi t\xEDnh n\u0103ng:\n{{ inputs.feature }}\n\nH\xE0nh vi b\u1EAFt bu\u1ED9\
      c:\n- \u0110\u0103ng k\xFD t\xE0i kho\u1EA3n H\u1ECDc vi\xEAn (learner) b\u1EB1\
      ng fullName, email, v\xE0 password; fullName ph\u1EA3i map v\xE0o users.name;\
      \ backend t\u1EF1 g\xE1n role LEARNER t\u1EEB roles.code = \"LEARNER\"; frontend\
      \ kh\xF4ng \u0111\u01B0\u1EE3c g\u1EEDi role.\n- \u0110\u0103ng nh\u1EADp/\u0111\
      \u0103ng xu\u1EA5t s\u1EED d\u1EE5ng JWT l\u01B0u trong Cookie httpOnly.\n-\
      \ \u0110\u1ECDc th\xF4ng tin ng\u01B0\u1EDDi d\xF9ng hi\u1EC7n t\u1EA1i/h\u1ED3\
      \ s\u01A1 c\xE1 nh\xE2n t\u1EEB phi\xEAn l\xE0m vi\u1EC7c (session) c\u1EE7\
      a backend.\n- Kh\xF4ng upload profile image/avatar trong registration; users.avatar_url\
      \ c\xF3 th\u1EC3 \u0111\u1EC3 NULL. Upload/c\u1EADp nh\u1EADt file \u1EA3nh\
      \ h\u1ED3 s\u01A1 qua public/images l\xE0 ph\u1EA1m vi profile update feature\
      \ sau, kh\xF4ng thu\u1ED9c feat-auth hi\u1EC7n t\u1EA1i.\n- X\xE1c th\u1EF1\
      c email b\u1EB1ng m\xE3 OTP 6 ch\u1EEF s\u1ED1 \u0111\u01B0\u1EE3c l\u01B0u\
      \ tr\u1EEF d\u01B0\u1EDBi d\u1EA1ng b\u1EB1ng ch\u1EE9ng b\u1EA3o m\u1EADt (kh\xF4\
      ng l\u01B0u m\xE3 th\xF4). OTP x\xE1c th\u1EF1c email h\u1EBFt h\u1EA1n sau\
      \ 10 ph\xFAt, t\u1ED1i \u0111a 5 l\u1EA7n nh\u1EADp sai, resend cooldown 60\
      \ gi\xE2y, v\xE0 resend ph\u1EA3i v\xF4 hi\u1EC7u OTP c\u0169 ch\u01B0a d\xF9\
      ng.\n- Khi x\xE1c th\u1EF1c email b\u1EB1ng OTP th\xE0nh c\xF4ng, backend ph\u1EA3\
      i chuy\u1EC3n user sang active/email_verified v\xE0 c\u1EA5p cookie ocp_access_token\
      \ + ocp_refresh_token \u0111\u1EC3 ng\u01B0\u1EDDi d\xF9ng \u0111\u01B0\u1EE3\
      c \u0111\u0103ng nh\u1EADp ngay.\n- \u0110\u1EB7t l\u1EA1i m\u1EADt kh\u1EA9\
      u cho c\xE1c t\xE0i kho\u1EA3n n\u1ED9i b\u1ED9 hi\u1EC7n c\xF3 b\u1EB1ng OTP\
      \ email. Backend ph\u1EA3i ki\u1EC3m tra email t\u1ED3n t\u1EA1i v\xE0 t\xE0\
      i kho\u1EA3n c\xF3 password_hash tr\u01B0\u1EDBc khi t\u1EA1o/g\u1EEDi OTP;\
      \ kh\xF4ng t\u1EA1o OTP reset cho email kh\xF4ng t\u1ED3n t\u1EA1i; kh\xF4ng\
      \ d\xF9ng reset token/link cho ng\u01B0\u1EDDi d\xF9ng; public forgot-password\
      \ response ph\u1EA3i d\xF9ng th\xF4ng b\xE1o chung \u0111\u1EC3 tr\xE1nh d\xF2\
      \ email \u0111\xE3 \u0111\u0103ng k\xFD.\n- Reset password OTP l\xE0 m\xE3 6\
      \ ch\u1EEF s\u1ED1, h\u1EBFt h\u1EA1n sau 10 ph\xFAt, t\u1ED1i \u0111a 5 l\u1EA7\
      n nh\u1EADp sai, resend cooldown 60 gi\xE2y, v\xE0 resend ph\u1EA3i v\xF4 hi\u1EC7\
      u OTP c\u0169 ch\u01B0a d\xF9ng.\n- Cho ph\xE9p ng\u01B0\u1EDDi d\xF9ng ch\u1EC9\
      \ \u0111\u0103ng nh\u1EADp b\u1EB1ng Google t\u1EA1o m\u1EADt kh\u1EA9u n\u1ED9\
      i b\u1ED9 \u0111\u1EA7u ti\xEAn c\u1EE7a h\u1ECD, nh\u01B0ng ch\u1EC9 \u0111\
      \u01B0\u1EE3c th\u1EF1c hi\u1EC7n t\u1EEB b\xEAn trong \u1EE9ng d\u1EE5ng sau\
      \ khi \u0111\xE3 \u0111\u0103ng nh\u1EADp th\xE0nh c\xF4ng.\n- H\u1ED7 tr\u1EE3\
      \ \u0111\u0103ng nh\u1EADp/li\xEAn k\u1EBFt t\xE0i kho\u1EA3n b\u1EB1ng Google\
      \ OAuth th\xF4ng qua b\u1EA3ng oauth_accounts.\n- Hi\u1EC3n th\u1ECB n\xFAt\
      \ \u0111\u0103ng nh\u1EADp b\u1EB1ng Google ngay c\u1EA3 khi thi\u1EBFu c\u1EA5\
      u h\xECnh Google, nh\u01B0ng khi nh\u1EA5p v\xE0o ch\u1EC9 hi\u1EC3n th\u1ECB\
      \ tr\u1EA1ng th\xE1i an to\xE0n l\xE0 \"ch\u01B0a \u0111\u01B0\u1EE3c c\u1EA5\
      u h\xECnh\" v\xE0 kh\xF4ng bao gi\u1EDD y\xEAu c\u1EA7u nh\u1EADp th\xF4ng tin\
      \ OAuth th\xF4.\n- C\xE1c m\xE0n h\xECnh Auth frontend ph\u1EA3i b\xE1m theo\
      \ frontend/DESIGN.md; spec ph\u1EA3i ghi r\xF5 \u0111\xE2y l\xE0 r\xE0ng bu\u1ED9\
      c thi\u1EBFt k\u1EBF cho UI/UX, kh\xF4ng \u0111\u1EC3 agent t\u1EF1 ch\u1ECD\
      n style kh\xE1c.\n- Spec ph\u1EA3i ghi r\xF5 c\xE1c bi\u1EBFn m\xF4i tr\u01B0\
      \u1EDDng c\u1EA7n thi\u1EBFt d\u1EF1a tr\xEAn backend/.env.example v\xE0 frontend/.env.example,\
      \ g\u1ED3m API base URL, CORS origin, cookie/JWT config, database URL, SMTP\
      \ config b\u1EB1ng SMTP_HOST/SMTP_PORT/SMTP_SECURE/SMTP_USER/SMTP_PASS/SMTP_FROM_NAME/SMTP_FROM_EMAIL,\
      \ Google OAuth config b\u1EB1ng AUTH_GOOGLE_ID/AUTH_GOOGLE_SECRET v\xE0 OTP\
      \ config.\n- Backend implementation \u0111\u01B0\u1EE3c ph\xE9p load backend/.env\
      \ b\u1EB1ng dotenv v\xE0 \u0111\u1ECDc qua process.env, nh\u01B0ng kh\xF4ng\
      \ \u0111\u01B0\u1EE3c log ho\u1EB7c tr\u1EA3 v\u1EC1 secret env value. Ch\u1EC9\
      \ \u0111\u01B0\u1EE3c nh\u1EAFc t\xEAn bi\u1EBFn trong log/error/docs.\n- T\u1EEB\
      \ ch\u1ED1i \u0111\u0103ng nh\u1EADp \u0111\u1ED1i v\u1EDBi ng\u01B0\u1EDDi\
      \ d\xF9ng b\u1ECB kh\xF3a/x\xF3a \u1EDF t\u1EA5t c\u1EA3 c\xE1c ph\u01B0\u01A1\
      ng th\u1EE9c \u0111\u0103ng nh\u1EADp.\n- \xC1p d\u1EE5ng backend l\xE0m ngu\u1ED3\
      n d\u1EEF li\u1EC7u chu\u1EA9n duy nh\u1EA5t cho c\xE1c th\xF4ng tin v\u1EC1\
      \ vai tr\xF2 (role), ID ng\u01B0\u1EDDi d\xF9ng (userId), v\xE0 quy\u1EC1n truy\
      \ c\u1EADp.\n- Gi\u1EEF v\u1EEFng ranh gi\u1EDBi c\u1EE7a module auth; c\xE1\
      c module kh\xE1c s\u1EBD s\u1EED d\u1EE5ng d\u1EEF li\u1EC7u th\xF4ng qua c\xE1\
      c giao \u01B0\u1EDBc (contracts) c\u1EE7a Auth/User.\n- X\xE1c \u0111\u1ECB\
      nh r\xF5 r\xE0ng c\xE1c ph\u1EA7n n\u1EB1m ngo\xE0i ph\u1EA1m vi (out-of-scope):\
      \ thanh to\xE1n kh\xF3a h\u1ECDc (payment checkout), ghi danh (enrollment),\
      \ ti\u1EBFn \u0111\u1ED9 h\u1ECDc t\u1EADp, c\xE1c ch\u1EE9c n\u0103ng CRUD\
      \ c\u1EE7a admin, CRUD kh\xF3a h\u1ECDc, v\xE0 upload/c\u1EADp nh\u1EADt file\
      \ \u1EA3nh h\u1ED3 s\u01A1.\n\nC\xE1c quy\u1EBFt \u0111\u1ECBnh s\u1EA3n ph\u1EA9\
      m \u0111\xE3 \u0111\u01B0\u1EE3c th\xF4ng qua:\n- Ng\u01B0\u1EDDi d\xF9ng n\u1ED9\
      i b\u1ED9 \u0111ang ch\u1EDD x\xE1c th\u1EF1c (pending-verification) B\u1EAE\
      T BU\u1ED8C KH\xD4NG \u0111\u01B0\u1EE3c c\u1EA5p phi\xEAn \u0111\u0103ng nh\u1EAD\
      p cho \u0111\u1EBFn khi x\xE1c th\u1EF1c email th\xE0nh c\xF4ng.\n- Qu\xE1 tr\xEC\
      nh \u0111\u0103ng k\xFD s\u1EBD t\u1EA1o ngay m\u1ED9t ng\u01B0\u1EDDi d\xF9\
      ng v\u1EDBi tr\u1EA1ng th\xE1i pending_verification v\xE0 ch\u1EC9 k\xEDch ho\u1EA1\
      t t\xE0i kho\u1EA3n sau khi x\xE1c th\u1EF1c OTP th\xE0nh c\xF4ng.\n- Sau khi\
      \ x\xE1c th\u1EF1c OTP email th\xE0nh c\xF4ng, h\u1EC7 th\u1ED1ng ph\u1EA3i\
      \ t\u1EF1 \u0111\u1ED9ng \u0111\u0103ng nh\u1EADp ng\u01B0\u1EDDi d\xF9ng b\u1EB1\
      ng c\xE1ch c\u1EA5p ocp_access_token v\xE0 ocp_refresh_token.\n- fullName trong\
      \ request \u0111\u0103ng k\xFD \u0111\u01B0\u1EE3c l\u01B0u v\xE0o users.name\
      \ \u0111\u1EC3 \u0111\u1ED3ng b\u1ED9 v\u1EDBi DATABASE.md.\n- User \u0111\u0103\
      ng k\xFD public \u0111\u01B0\u1EE3c backend t\u1EF1 g\xE1n vai tr\xF2 LEARNER\
      \ b\u1EB1ng roles.code = \"LEARNER\"; frontend kh\xF4ng \u0111\u01B0\u1EE3c\
      \ g\u1EEDi ho\u1EB7c quy\u1EBFt \u0111\u1ECBnh role.\n- M\xE3 OTP x\xE1c th\u1EF1\
      c email g\u1ED3m 6 ch\u1EEF s\u1ED1, h\u1EBFt h\u1EA1n sau 10 ph\xFAt, cho ph\xE9\
      p th\u1EED sai t\u1ED1i \u0111a 5 l\u1EA7n, v\xE0 gi\u1EDBi h\u1EA1n g\u1EED\
      i l\u1EA1i m\xE3 l\xE0 60 gi\xE2y. Resend OTP x\xE1c th\u1EF1c email ph\u1EA3\
      i v\xF4 hi\u1EC7u OTP c\u0169 ch\u01B0a d\xF9ng.\n- Qu\xEAn/\u0111\u1EB7t l\u1EA1\
      i m\u1EADt kh\u1EA9u d\xF9ng OTP email, kh\xF4ng d\xF9ng reset token/link. Backend\
      \ ph\u1EA3i ki\u1EC3m tra email t\u1ED3n t\u1EA1i v\xE0 l\xE0 local account\
      \ c\xF3 password_hash tr\u01B0\u1EDBc khi t\u1EA1o/g\u1EEDi OTP reset. Kh\xF4\
      ng t\u1EA1o OTP reset cho email kh\xF4ng t\u1ED3n t\u1EA1i ho\u1EB7c Google-only\
      \ user c\xF3 password_hash = NULL. Public forgot-password response ph\u1EA3\
      i d\xF9ng th\xF4ng b\xE1o chung \u0111\u1EC3 tr\xE1nh d\xF2 email \u0111\xE3\
      \ \u0111\u0103ng k\xFD.\n- Reset password OTP g\u1ED3m 6 ch\u1EEF s\u1ED1, h\u1EBF\
      t h\u1EA1n sau 10 ph\xFAt, cho ph\xE9p th\u1EED sai t\u1ED1i \u0111a 5 l\u1EA7\
      n, v\xE0 gi\u1EDBi h\u1EA1n g\u1EEDi l\u1EA1i m\xE3 l\xE0 60 gi\xE2y. Resend\
      \ reset OTP ph\u1EA3i v\xF4 hi\u1EC7u OTP c\u0169 ch\u01B0a d\xF9ng.\n- G\u1EED\
      i email s\u1EED d\u1EE5ng Nodemailer SMTP. \u1EE8ng d\u1EE5ng c\xF3 th\u1EC3\
      \ kh\u1EDFi \u0111\u1ED9ng khi kh\xF4ng c\xF3 c\u1EA5u h\xECnh SMTP, nh\u01B0\
      ng c\xE1c h\xE0nh \u0111\u1ED9ng g\u1EEDi email \u0111\u0103ng k\xFD/\u0111\u1EB7\
      t l\u1EA1i m\u1EADt kh\u1EA9u ph\u1EA3i th\u1EA5t b\u1EA1i m\u1ED9t c\xE1ch\
      \ an to\xE0n v\xE0 kh\xF4ng \u0111\u01B0\u1EE3c b\xE1o th\xE0nh c\xF4ng gi\u1EA3\
      \ t\u1EA1o (silently succeed).\n- Ng\u01B0\u1EDDi d\xF9ng Google OAuth c\xF3\
      \ email \u0111\xE3 \u0111\u01B0\u1EE3c Google x\xE1c th\u1EF1c c\xF3 th\u1EC3\
      \ \u0111\u01B0\u1EE3c t\u1EA1o d\u01B0\u1EDBi d\u1EA1ng t\xE0i kho\u1EA3n h\u1ECD\
      c vi\xEAn \u0111\xE3 x\xE1c th\u1EF1c email (email_verified) v\xE0 \u1EDF tr\u1EA1\
      ng th\xE1i ho\u1EA1t \u0111\u1ED9ng (active).\n- N\u1EBFu email \u0111\u01B0\
      \u1EE3c x\xE1c th\u1EF1c b\u1EDFi Google tr\xF9ng v\u1EDBi email c\u1EE7a m\u1ED9\
      t ng\u01B0\u1EDDi d\xF9ng OCP \u0111ang ho\u1EA1t \u0111\u1ED9ng nh\u01B0ng\
      \ ch\u01B0a c\xF3 li\xEAn k\u1EBFt oauth_accounts, h\xE3y t\u1EA1o li\xEAn k\u1EBF\
      t OAuth cho ng\u01B0\u1EDDi d\xF9ng hi\u1EC7n t\u1EA1i \u0111\xF3 v\xE0 b\u1EAF\
      t \u0111\u1EA7u phi\xEAn l\xE0m vi\u1EC7c b\u1EA3o m\u1EADt nh\u01B0 b\xECnh\
      \ th\u01B0\u1EDDng.\n- Ch\u1EE9c n\u0103ng qu\xEAn m\u1EADt kh\u1EA9u c\xF4\
      ng khai ngo\xE0i m\xE0n h\xECnh \u0111\u0103ng nh\u1EADp KH\xD4NG \u0110\u01AF\
      \u1EE2C PH\xC9P t\u1EA1o m\u1EADt kh\u1EA9u n\u1ED9i b\u1ED9 \u0111\u1EA7u ti\xEA\
      n cho ng\u01B0\u1EDDi d\xF9ng ch\u1EC9 \u0111\u0103ng nh\u1EADp b\u1EB1ng Google\
      \ (nh\u1EEFng ng\u01B0\u1EDDi c\xF3 tr\u01B0\u1EDDng password_hash = NULL);\
      \ h\u1ECD ph\u1EA3i \u0111\u0103ng nh\u1EADp b\u1EB1ng Google tr\u01B0\u1EDB\
      c, sau \u0111\xF3 s\u1EED d\u1EE5ng t\xEDnh n\u0103ng \u0111\u1EB7t m\u1EAD\
      t kh\u1EA9u n\u1ED9i b\u1ED9 t\u1EEB b\xEAn trong \u1EE9ng d\u1EE5ng.\n- Phi\xEA\
      n l\xE0m vi\u1EC7c s\u1EED d\u1EE5ng c\u01A1 ch\u1EBF Token l\xE0m m\u1EDBi\
      \ (Refresh-token) n\u1EB1m trong ph\u1EA1m vi ph\xE1t tri\u1EC3n. Ch\u1EC9 l\u01B0\
      u tr\u1EEF b\u1EA3n b\u0103m c\u1EE7a refresh token trong b\u1EA3ng refresh_tokens;\
      \ ti\u1EBFn h\xE0nh xoay v\xF2ng (rotate) v\xE0 thu h\u1ED3i (revoke) c\xE1\
      c refresh token khi l\xE0m m\u1EDBi phi\xEAn ho\u1EB7c \u0111\u0103ng xu\u1EA5\
      t.\n- T\xEAn c\u1EE7a c\xE1c cookie: ocp_access_token v\xE0 ocp_refresh_token.\n\
      - Cookie/CORS: sameSite = \"lax\"; secure = false \u1EDF local dev; secure =\
      \ true \u1EDF production; CORS d\xF9ng exact FRONTEND_ORIGIN + credentials:\
      \ true; kh\xF4ng d\xF9ng wildcard origin khi g\u1EEDi cookie.\n- CSRF: MVP same-site\
      \ ch\u01B0a b\u1EAFt bu\u1ED9c CSRF token; n\u1EBFu deploy b\u1EAFt bu\u1ED9\
      c SameSite=None/cross-site cookie th\xEC ph\u1EA3i b\u1ED5 sung CSRF protection\
      \ tr\u01B0\u1EDBc khi implement endpoint state-changing.\n- Middleware s\u1EBD\
      \ \u0111\xEDnh k\xE8m th\xF4ng tin \u0111\u1ECBnh danh \u0111\xE1ng tin c\u1EAD\
      y v\xE0o thu\u1ED9c t\xEDnh req.user.\n- Phi\xEAn refresh token v\u1EABn n\u1EB1\
      m trong scope: access token h\u1EBFt h\u1EA1n sau 15 minutes; refresh token\
      \ h\u1EBFt h\u1EA1n sau 7 ng\xE0y; refresh token \u0111\u01B0\u1EE3c rotate\
      \ khi refresh v\xE0 revoke khi logout.\n- B\u1EA3ng password_reset_tokens d\xF9\
      ng cho reset OTP ph\u1EA3i c\xF3 c\xE1c field t\u01B0\u01A1ng \u0111\u01B0\u01A1\
      ng: otp_hash, expires_at, used_at, failed_attempts, locked_at, last_sent_at,\
      \ created_at. N\u1EBFu d\xF9ng t\xEAn b\u1EA3ng kh\xE1c, spec ph\u1EA3i ghi\
      \ r\xF5 mapping v\xE0 kh\xF4ng \u0111\u01B0\u1EE3c l\u01B0u raw OTP.\n\nKh\xF4\
      ng bao g\u1ED3m c\xE1c chi ti\u1EBFt tri\u1EC3n khai m\xE3 ngu\u1ED3n n\u1EB1\
      m ngo\xE0i y\xEAu c\u1EA7u \u0111\u1EB7c t\u1EA3 c\u1EE7a Speckit.\n"
- id: plan
  command: speckit.plan
  integration: '{{ inputs.integration }}'
  input:
    args: "S\u1EED d\u1EE5ng c\xFA ph\xE1p l\u1EC7nh m\u1EDBi nh\u1EA5t c\u1EE7a Speckit\
      \ cho l\u1EC7nh speckit.plan.\n\nB\u1EA1n B\u1EAET BU\u1ED8C ph\u1EA3i \u0111\
      \u1ECDc c\xE1c file sau tr\u01B0\u1EDBc khi t\u1EA1o file plan.md:\n- DATABASE.md\n\
      - AGENTS.md\n- PROJECT_AGENTS.md\n- frontend/DESIGN.md\n- backend/.env.example\n\
      - frontend/.env.example\n- {{ inputs.feature_dir }}/context.md\n- {{ inputs.feature_dir\
      \ }}/spec.md\n\nC\xE1c r\xE0ng bu\u1ED9c k\u1EF9 thu\u1EADt:\n- Backend: REST\
      \ API vi\u1EBFt b\u1EB1ng NodeJS + JavaScript ESM theo phong c\xE1ch Express;\
      \ d\xF9ng package.json \"type\": \"module\" v\xE0 import/export; kh\xF4ng d\xF9\
      ng TypeScript ho\u1EB7c CommonJS cho scope hi\u1EC7n t\u1EA1i.\n- Frontend:\
      \ React + JSX + Bootstrap b\u1EB1ng Create React App/react-scripts; API client\
      \ ph\u1EA3i g\u1EEDi cookie b\u1EB1ng withCredentials: true.\n- Frontend UI:\
      \ B\u1EAFt bu\u1ED9c \u0111\u1ECDc v\xE0 b\xE1m frontend/DESIGN.md khi l\u1EAD\
      p k\u1EBF ho\u1EA1ch c\xE1c trang Login/Register/Verify/Forgot/Reset/Google\
      \ not-configured state v\xE0 c\xE1c component Auth li\xEAn quan.\n- Env config:\
      \ B\u1EAFt bu\u1ED9c d\xF9ng \u0111\xFAng t\xEAn bi\u1EBFn trong backend/.env.example\
      \ v\xE0 frontend/.env.example. Backend load backend/.env b\u1EB1ng dotenv v\xE0\
      \ \u0111\u1ECDc qua process.env. Backend d\xF9ng FRONTEND_ORIGIN, DATABASE_URL,\
      \ AUTH_SECRET, JWT_ACCESS_EXPIRES_IN, JWT_REFRESH_EXPIRES_IN, BCRYPT_SALT_ROUNDS,\
      \ Cookie/OTP config, SMTP_HOST/SMTP_PORT/SMTP_SECURE/SMTP_USER/SMTP_PASS/SMTP_FROM_NAME/SMTP_FROM_EMAIL\
      \ v\xE0 AUTH_GOOGLE_ID/AUTH_GOOGLE_SECRET. Frontend d\xF9ng REACT_APP_API_BASE_URL;\
      \ kh\xF4ng d\xF9ng VITE_*.\n- Package manager: npm. Root/backend/frontend scripts\
      \ d\xF9ng npm, kh\xF4ng d\xF9ng pnpm/yarn trong scope n\xE0y.\n- Frontend env\
      \ variables d\xF9ng prefix REACT_APP_, hi\u1EC7n c\u1EA7n REACT_APP_API_BASE_URL;\
      \ kh\xF4ng d\xF9ng VITE_. Kh\xF4ng th\xEAm REACT_APP_GOOGLE_CLIENT_ID tr\u1EEB\
      \ khi spec explicitly ch\u1ECDn frontend t\u1EF1 kh\u1EDFi t\u1EA1o Google Identity\
      \ Services.\n- Test setup \u0111\xE3 duy\u1EC7t: backend d\xF9ng node:test +\
      \ assert + supertest; frontend d\xF9ng node:test cho API client/source-rule\
      \ tests nh\u1EB9; kh\xF4ng th\xEAm Jest/Vitest/Cypress n\u1EBFu ch\u01B0a \u0111\
      \u01B0\u1EE3c duy\u1EC7t.\n- ORM/C\u01A1 s\u1EDF d\u1EEF li\u1EC7u: Prisma +\
      \ MySQL.\n- Ki\u1EC3m tra d\u1EEF li\u1EC7u \u0111\u1EA7u v\xE0o (Validation):\
      \ S\u1EED d\u1EE5ng Zod cho body/query/params.\n- Register schema b\u1EAFt bu\u1ED9\
      c c\xF3 fullName, email, password; fullName map v\xE0o users.name; backend t\u1EF1\
      \ g\xE1n role LEARNER t\u1EEB roles.code = \"LEARNER\"; kh\xF4ng nh\u1EADn image/avatar\
      \ ho\u1EB7c role trong register body.\n- X\xE1c th\u1EF1c (Auth): JWT l\u01B0\
      u trong Cookie httpOnly, m\xE3 h\xF3a bcrypt, Google OAuth.\n- Cookie/CORS auth:\
      \ sameSite = \"lax\", secure = false \u1EDF local dev, secure = true \u1EDF\
      \ production, CORS exact FRONTEND_ORIGIN + credentials: true, kh\xF4ng wildcard\
      \ origin khi g\u1EEDi cookie.\n- CSRF: MVP same-site ch\u01B0a b\u1EAFt bu\u1ED9\
      c CSRF token; n\u1EBFu ph\u1EA3i d\xF9ng SameSite=None/cross-site cookie th\xEC\
      \ ph\u1EA3i b\u1ED5 sung CSRF protection tr\u01B0\u1EDBc khi implement endpoint\
      \ state-changing.\n- Email: B\u1ED9 \u0111i\u1EC1u h\u1EE3p (adapter) Nodemailer\
      \ SMTP; qu\xE1 tr\xECnh kh\u1EDFi \u0111\u1ED9ng h\u1EC7 th\u1ED1ng kh\xF4ng\
      \ b\u1EAFt bu\u1ED9c ph\u1EA3i c\xF3 c\u1EA5u h\xECnh SMTP, nh\u01B0ng c\xE1\
      c thao t\xE1c g\u1EEDi email ph\u1EA3i th\u1EA5t b\u1EA1i m\u1ED9t c\xE1ch an\
      \ to\xE0n khi thi\u1EBFu c\u1EA5u h\xECnh.\n- X\xE1c th\u1EF1c email: M\xE3\
      \ OTP 6 ch\u1EEF s\u1ED1, h\u1EBFt h\u1EA1n sau 10 ph\xFAt, th\u1EED sai t\u1ED1\
      i \u0111a 5 l\u1EA7n, th\u1EDDi gian ch\u1EDD g\u1EEDi l\u1EA1i l\xE0 60 gi\xE2\
      y; resend v\xF4 hi\u1EC7u OTP c\u0169 ch\u01B0a d\xF9ng; verify th\xE0nh c\xF4\
      ng active user v\xE0 set auth cookies.\n- Reset password: D\xF9ng OTP email\
      \ 6 ch\u1EEF s\u1ED1, h\u1EBFt h\u1EA1n sau 10 ph\xFAt, th\u1EED sai t\u1ED1\
      i \u0111a 5 l\u1EA7n, th\u1EDDi gian ch\u1EDD g\u1EEDi l\u1EA1i l\xE0 60 gi\xE2\
      y; public forgot-password response kh\xF4ng \u0111\u01B0\u1EE3c ti\u1EBFt l\u1ED9\
      \ email c\xF3 t\u1ED3n t\u1EA1i hay kh\xF4ng; kh\xF4ng t\u1EA1o reset OTP cho\
      \ email kh\xF4ng t\u1ED3n t\u1EA1i ho\u1EB7c Google-only user.\n- M\xF4 h\xEC\
      nh d\u1EEF li\u1EC7u (Data model) ph\u1EA3i kh\u1EDBp v\u1EDBi c\xE1c b\u1EA3\
      ng: roles, users, refresh_tokens, email_verifications, password_reset_tokens,\
      \ oauth_accounts. password_reset_tokens ph\u1EA3i d\xF9ng semantics reset OTP\
      \ v\u1EDBi otp_hash, expires_at, used_at, failed_attempts, locked_at, last_sent_at,\
      \ created_at; kh\xF4ng d\xF9ng raw token/link.\n- C\xE1c Controller kh\xF4ng\
      \ \u0111\u01B0\u1EE3c ch\u1EE9a logic nghi\u1EC7p v\u1EE5 (business logic).\n\
      - C\xE1c Service kh\xF4ng \u0111\u01B0\u1EE3c ph\xE9p import tr\u1EF1c ti\u1EBF\
      p th\u01B0 vi\u1EC7n Prisma.\n- C\xE1c Repository n\u1EAFm quy\u1EC1n truy c\u1EAD\
      p v\xE0 thao t\xE1c v\u1EDBi c\u01A1 s\u1EDF d\u1EEF li\u1EC7u.\n- Kh\xF4ng\
      \ l\u01B0u tr\u1EEF c\xE1c th\xF4ng tin th\xF4 nh\u01B0: JWT th\xF4, OTP x\xE1\
      c th\u1EF1c email th\xF4, OTP \u0111\u1EB7t l\u1EA1i m\u1EADt kh\u1EA9u th\xF4\
      , Google token th\xF4, th\xF4ng tin t\xE0i kho\u1EA3n SMTP, m\u1EADt kh\u1EA9\
      u d\u1EA1ng v\u0103n b\u1EA3n thu\u1EA7n (plain text), ho\u1EB7c c\xE1c chu\u1ED7\
      i b\xED m\u1EADt (secrets).\n- S\u1EED d\u1EE5ng c\xE1c giao \u01B0\u1EDBc (contracts)\
      \ t\u1EEB ph\xEDa backend \u0111\u1EC3 qu\u1EA3n l\xFD \u0111\u1ECBnh danh v\xE0\
      \ phi\xEAn l\xE0m vi\u1EC7c; c\xE1c b\u1ED9 b\u1EA3o v\u1EC7 (guards) \u1EDF\
      \ frontend ch\u1EC9 ph\u1EE5c v\u1EE5 cho tr\u1EA3i nghi\u1EC7m ng\u01B0\u1EDD\
      i d\xF9ng (UX).\n"
- id: tasks
  command: speckit.tasks
  integration: '{{ inputs.integration }}'
  input:
    args: "S\u1EED d\u1EE5ng c\xFA ph\xE1p l\u1EC7nh m\u1EDBi nh\u1EA5t c\u1EE7a Speckit\
      \ cho l\u1EC7nh speckit.tasks.\n\nB\u1EA1n B\u1EAET BU\u1ED8C ph\u1EA3i \u0111\
      \u1ECDc c\xE1c file sau tr\u01B0\u1EDBc khi t\u1EA1o file tasks.md:\n- DATABASE.md\n\
      - AGENTS.md\n- PROJECT_AGENTS.md\n- frontend/DESIGN.md\n- backend/.env.example\n\
      - frontend/.env.example\n- {{ inputs.feature_dir }}/context.md\n- {{ inputs.feature_dir\
      \ }}/spec.md\n- {{ inputs.feature_dir }}/plan.md\n\nT\u1EA1o c\xE1c nhi\u1EC7\
      m v\u1EE5 (tasks) nh\u1ECF g\u1ECDn (atomic), c\xF3 th\u1EE9 t\u1EF1 ph\u1EE5\
      \ thu\u1ED9c r\xF5 r\xE0ng (dependency-ordered), v\xE0 c\xF3 th\u1EC3 ki\u1EC3\
      m th\u1EED \u0111\u01B0\u1EE3c cho t\xEDnh n\u0103ng feat-auth.\nM\u1ED7i nhi\u1EC7\
      m v\u1EE5 ph\u1EA3i tham chi\u1EBFu \u0111\u1EBFn c\xE1c y\xEAu c\u1EA7u trong\
      \ t\xE0i li\u1EC7u \u0111\u1EB7c t\u1EA3 (spec) v\xE0 bao g\u1ED3m c\xE1c \u0111\
      i\u1EC1u ki\u1EC7n nghi\u1EC7m thu ho\xE0n th\xE0nh (done criteria) r\xF5 r\xE0\
      ng.\nBao g\u1ED3m c\xE1c k\u1ECBch b\u1EA3n ki\u1EC3m th\u1EED (tests) cho:\
      \ \u0111\u0103ng k\xFD b\u1EAFt bu\u1ED9c fullName/email/password, fullName\
      \ \u0111\u01B0\u1EE3c map v\xE0o users.name, backend t\u1EF1 g\xE1n role LEARNER\
      \ v\xE0 kh\xF4ng nh\u1EADn role/image/avatar t\u1EEB frontend, x\xE1c th\u1EF1\
      c n\u1ED9i b\u1ED9, x\xE1c th\u1EF1c OTP email, OTP email h\u1EBFt h\u1EA1n,\
      \ kh\xF3a OTP record khi th\u1EED sai OTP qu\xE1 s\u1ED1 l\u1EA7n, th\u1EDD\
      i gian ch\u1EDD g\u1EEDi l\u1EA1i OTP email, resend OTP email v\xF4 hi\u1EC7\
      u OTP c\u0169, x\xE1c th\u1EF1c OTP email th\xE0nh c\xF4ng th\xEC active user\
      \ v\xE0 set auth cookies, qu\xEAn/\u0111\u1EB7t l\u1EA1i m\u1EADt kh\u1EA9u\
      \ b\u1EB1ng OTP email, reset OTP h\u1EBFt h\u1EA1n, kh\xF3a reset OTP record\
      \ khi th\u1EED sai qu\xE1 s\u1ED1 l\u1EA7n, th\u1EDDi gian ch\u1EDD g\u1EED\
      i l\u1EA1i reset OTP, resend reset OTP v\xF4 hi\u1EC7u OTP c\u0169, kh\xF4ng\
      \ t\u1EA1o reset OTP cho email kh\xF4ng t\u1ED3n t\u1EA1i, public forgot-password\
      \ response kh\xF4ng ti\u1EBFt l\u1ED9 email t\u1ED3n t\u1EA1i hay kh\xF4ng,\
      \ kh\xF4ng t\u1EA1o reset OTP cho Google-only user c\xF3 password_hash = NULL,\
      \ l\u1ED7i thi\u1EBFu c\u1EA5u h\xECnh Nodemailer, Google OAuth, t\u1EF1 \u0111\
      \u1ED9ng li\xEAn k\u1EBFt t\xE0i kho\u1EA3n khi tr\xF9ng email Google \u0111\
      \xE3 x\xE1c th\u1EF1c, \u0111\u1EB7t m\u1EADt kh\u1EA9u trong \u1EE9ng d\u1EE5\
      ng cho t\xE0i kho\u1EA3n ch\u1EC9 c\xF3 Google, giao di\u1EC7n khi thi\u1EBF\
      u c\u1EA5u h\xECnh Google, c\xE1c trang/component Auth b\xE1m frontend/DESIGN.md,\
      \ s\u1EED d\u1EE5ng \u0111\xFAng bi\u1EBFn m\xF4i tr\u01B0\u1EDDng t\u1EEB backend/.env.example\
      \ v\xE0 frontend/.env.example, h\xE0nh vi c\u1EE7a cookie, refresh token rotation/revoke,\
      \ c\xE1c l\u1ED7i ki\u1EC3m tra d\u1EEF li\u1EC7u \u0111\u1EA7u v\xE0o (validation\
      \ errors), t\u1EEB ch\u1ED1i ng\u01B0\u1EDDi d\xF9ng b\u1ECB kh\xF3a/x\xF3a,\
      \ ch\xEDnh s\xE1ch x\u1EED l\xFD tr\xF9ng email/li\xEAn k\u1EBFt t\xE0i kho\u1EA3\
      n, v\xE0 ng\u0103n ch\u1EB7n r\xF2 r\u1EC9 chu\u1ED7i b\xED m\u1EADt/token/OTP.\n\
      Kh\xF4ng bao g\u1ED3m vi\u1EC7c th\u1EF1c thi hay ch\u1EA1y code trong workflow\
      \ n\xE0y.\n"
